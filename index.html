  <script>
(function(){
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const modalRoot = document.getElementById('modal-root');

let W, H, scale;
const GAME_W = 512, GAME_H = 288;

function resize() {
    W = window.innerWidth; H = window.innerHeight;
    scale = Math.min(W / GAME_W, H / GAME_H);
    canvas.width = W; canvas.height = H;
    ctx.imageSmoothingEnabled = false;
}
resize();
window.addEventListener('resize', resize);

let state = 'start';
let wave = 0, castleHP = 100, maxHP = 100, ammo = 3, maxAmmo = 10, gold = 0, maxGold = 100, kills = 0;
// maxHP before Castle Keep's percentage bonus is layered on top — Stone
// Walls and the Kingdom's Reinforced Walls both add to this directly, while
// Keep's own bonus is always computed fresh off THIS value (see
// recomputeMaxHP), so repeat Keep picks can never compound on themselves.
let maxHPBeforeKeep = 100;
let enemies = [], projectiles = [], particles = [], towers = [], cards = [];
// Friendly melee minions spawned periodically by the Necromancer tower.
// Each one walks to the nearest living enemy inside the tower's range and
// pokes it for skeletonDmg every ~0.5s, until its lifespan runs out.
let skeletonAllies = [];
let betweenWaveQuestions = 0, betweenWaveCorrect = 0;
let animFrame = 0;
let castleColor = '#555577', wallHP = 0;
let globalDmgMult = 1, globalSpeedMult = 1;
let hasMoat = false, hasKing = false, hasDragon = false, hasMeteor = false, hasElite = false;
let hasWizard = false, wizardTimer = 0, wizardSpellIndex = 0;
let dragonTimer = 0, meteorTimer = 0;
// Tracks how many times each *non-tower* card has been picked this run.
// Towers keep their own separate dmg/range/rate upgrade cycle (unchanged);
// every other repeatable card instead gets 50% stronger per repeat pick,
// via getCardEffectMult() below.
let cardLevels = {};
let merchantGoldBonus = 0, commanderCritChance = 0, overclockJamChance = 0;
let merchantNpcDmgMult = 1; // permanent bonus from the "Glass Cannon" random Merchant NPC deal — survives recomputes below
function getCardLevel(id){ return cardLevels[id]||0; }
// Was Math.pow(1.5, lvl-1) — pure geometric compounding, which let a handful
// of repeat picks on cards like King's Servant or The King spiral into
// thousands-of-percent bonuses over a long run. Now it's linear: each repeat
// pick adds a flat +50% of the card's BASE amount, not +50% of whatever the
// bonus has already grown to. Level 5 is now +200% of base instead of +506%.
function getCardEffectMult(id){ let lvl=getCardLevel(id); return lvl>0 ? 1 + 0.5*(lvl-1) : 1; }
// Recomputed from scratch (not multiplied in place) every time a relevant
// card is picked, so each card's own bonus scales independently off its own
// level rather than compounding on top of whatever order cards were picked in.
function recomputeGlobalMultipliers(){
    let dmgBonus = 0, speedBonus = 0;
    if(cardLevels['servant']) dmgBonus += 1.0*getCardEffectMult('servant');   // King's Servant: +100% base
    if(cardLevels['theking']) dmgBonus += 1.0*getCardEffectMult('theking');   // The King: +100% base
    if(cardLevels['warhorn']) speedBonus += 0.3*getCardEffectMult('warhorn'); // War Horn: +30% base
    if(cardLevels['theking']) speedBonus += 0.5*getCardEffectMult('theking'); // The King: +50% base
    if(cardLevels['overclock']) speedBonus += 0.75*getCardEffectMult('overclock'); // Overclock: +75% base, risky
    globalDmgMult = (1+dmgBonus)*merchantNpcDmgMult;
    globalSpeedMult = 1+speedBonus;
    merchantGoldBonus = cardLevels['merchant'] ? 0.2*getCardEffectMult('merchant') : 0;       // Merchant: +20% gold base
    commanderCritChance = cardLevels['commander'] ? Math.min(1, 0.05*getCardEffectMult('commander')) : 0; // Commander: 5% crit base
    // Overclock's downside scales with it too — the faster it fires, the more it jams. Capped so towers never go fully silent.
    overclockJamChance = cardLevels['overclock'] ? Math.min(0.4, 0.12*getCardEffectMult('overclock')) : 0;
}

// Castle Keep's percentage bonus is always computed fresh from its own level
// against maxHPBeforeKeep (Kingdom Walls + Stone Walls' flat additions) —
// never against the current, already-boosted maxHP. That's what stops
// repeat Keep picks from compounding on themselves (2x, then 2.5x AGAIN on
// top of the already-doubled value, etc.) into absurd numbers.
function recomputeMaxHP(){
    let oldMax = maxHP;
    let keepMult = cardLevels['keep'] ? (1 + 1.0*getCardEffectMult('keep')) : 1; // Keep: +100% base
    maxHP = Math.round(maxHPBeforeKeep * keepMult);
    // Top up castleHP by however much the cap just grew, rather than always
    // fully healing — consistent whether the increase came from Stone Walls
    // or Castle Keep, and doesn't turn Keep into a free full-heal button.
    if(maxHP > oldMax) castleHP = Math.min(castleHP + (maxHP-oldMax), maxHP);
    else castleHP = Math.min(castleHP, maxHP);
}
let townBuildings = 0;

function addTownBuilding() {
    townBuildings++;
}
let goldMines = 0, priestHeal = false;
let currentBossDef = null, towersFrozen = 0;
let towerTargetMode = 'nearest'; // 'nearest' | 'strongest' — cycled via the HUD button
let lightningBolts = []; // transient visual chain-lightning effects: {points:[{x,y},...], life}
let ammoPerCorrect = 1;

// ═══════════════════════════════════════════════════════════════════════════
// THE KINGDOM — persistent meta-progression shop, spent between runs.
// Crowns carry over across page reloads via localStorage. Effects are
// intentionally undocumented in the shop UI — players discover them by
// noticing how their next run feels different, not by reading a tooltip.
// ═══════════════════════════════════════════════════════════════════════════
const KINGDOM_SAVE_KEY = 'castleDefenceKingdomSave_v1';
function loadKingdomSave(){
    try {
        let raw = localStorage.getItem(KINGDOM_SAVE_KEY);
        if(raw){
            let parsed = JSON.parse(raw);
            if(parsed && typeof parsed==='object') return {
                crowns: parsed.crowns||0,
                levels: parsed.levels||{},
                totalCorrectAnswers: parsed.totalCorrectAnswers||0,
                equippedPowerups: parsed.equippedPowerups||[],
                notifiedThresholds: parsed.notifiedThresholds||[],
            };
        }
    } catch(err){ console.warn('Kingdom save unavailable (localStorage blocked) — progress will not persist this session.', err); }
    return { crowns:0, levels:{}, totalCorrectAnswers:0, equippedPowerups:[], notifiedThresholds:[] };
}
let kingdomStorageOk = true;
function saveKingdomSave(){
    try { localStorage.setItem(KINGDOM_SAVE_KEY, JSON.stringify(kingdomSave)); }
    catch(err){ kingdomStorageOk = false; console.warn('Could not persist Kingdom save', err); }
}
let kingdomSave = loadKingdomSave();

const KINGDOM_UPGRADES = [
    { id:'soldiers',        category:'Military',  name:'⚔️ Trained Soldiers',   baseCost:20, costMult:1.5,  maxLevel:20 },
    { id:'archives',        category:'Military',  name:'📜 Scholarly Archives', baseCost:25, costMult:1.5,  maxLevel:20 },
    { id:'blacksmith',      category:'Military',  name:'🔨 Blacksmith',         baseCost:30, costMult:1.55, maxLevel:20 },
    { id:'siegeengineers',  category:'Military',  name:'💣 Siege Engineers',    baseCost:25, costMult:1.5,  maxLevel:20 },
    { id:'traininggrounds', category:'Military',  name:'🏕️ Training Grounds',   baseCost:40, costMult:1,    maxLevel:1  },
    { id:'treasury',        category:'Economy',   name:'💰 Treasury',           baseCost:35, costMult:1.85, maxLevel:15 },
    { id:'marketplace',     category:'Economy',   name:'🏪 Marketplace',        baseCost:35, costMult:1.85, maxLevel:10 },
    { id:'supplydepot',     category:'Economy',   name:'📦 Supply Depot',       baseCost:30, costMult:1.85, maxLevel:9  },
    { id:'warehouse',       category:'Economy',   name:'🏭 Warehouse',          baseCost:30, costMult:1.85, maxLevel:15 },
    { id:'walls',           category:'Castle',    name:'🧱 Reinforced Walls',   baseCost:20, costMult:1.45, maxLevel:20 },
    { id:'healers',         category:'Castle',    name:'✨ Royal Healers',      baseCost:35, costMult:1.5,  maxLevel:20 },
    { id:'watchtowers',     category:'Castle',    name:'🔭 Watch Towers',       baseCost:40, costMult:1.6,  maxLevel:3  },
    { id:'studyhall',       category:'Education', name:'🎓 Study Hall',         baseCost:25, costMult:1.5,  maxLevel:15 },
    { id:'apprenticeships', category:'Education', name:'🛠️ Apprenticeships',    baseCost:30, costMult:1.5,  maxLevel:15 },
    { id:'library',         category:'Education', name:'📚 Library',            baseCost:30, costMult:1.5,  maxLevel:15 },
    { id:'academy',         category:'Education', name:'🏛️ Academy',            baseCost:35, costMult:1.55, maxLevel:10 },
];

function kingdomLevel(id){ return kingdomSave.levels[id]||0; }

function kingdomUpgradeCost(upg){
    let level = kingdomLevel(upg.id);
    let raw = upg.baseCost * Math.pow(upg.costMult, level);
    let marketLevel = kingdomLevel('marketplace');
    let discount = Math.max(0.5, 1 - 0.05*marketLevel); // discount caps at 50% off
    return Math.max(1, Math.round(raw*discount));
}

function buyKingdomUpgrade(id){
    let upg = KINGDOM_UPGRADES.find(u=>u.id===id);
    if(!upg) return false;
    let level = kingdomLevel(id);
    if(level>=upg.maxLevel) return false;
    let cost = kingdomUpgradeCost(upg);
    if(kingdomSave.crowns<cost) return false;
    kingdomSave.crowns -= cost;
    kingdomSave.levels[id] = level+1;
    saveKingdomSave();
    return true;
}

// Reads all Kingdom levels into the runtime bonus variables used throughout
// the game, and applies the one-time start-of-run effects (starting HP/ammo/
// tower). Called once when a run begins.
let kingdomDmgBonusArcherAxe = 0, kingdomEffectDurationMult = 1, kingdomRateMult = 1, kingdomSplashBonusMult = 1;
let kingdomGoldMult = 1, kingdomHealAfterBossPct = 0, kingdomWatchTowerLevel = 0;
let kingdomStudyHallLevel = 0, kingdomApprenticeshipLevel = 0, kingdomLibraryLevel = 0, kingdomAcademyLevel = 0;
let kingdomHealersSkeletonBonus = 0; // Royal Healers also strengthens the Necromancer tower — see applyKingdomStartBonuses
let totalBetweenWaveCorrect = 0;
let lastWaveWasBoss = false;
let pendingMerchantRoll = null; // Watch Tower lvl2 pre-roll, consumed by the next startBetweenWave
let weatherPreRolledForNextWave = false; // Watch Tower lvl3 pre-roll, consumed by the next startWave

function applyKingdomStartBonuses(){
    kingdomDmgBonusArcherAxe = kingdomLevel('soldiers');
    kingdomEffectDurationMult = 1 + 0.1*kingdomLevel('archives');
    kingdomRateMult = Math.pow(0.99, kingdomLevel('blacksmith'));
    kingdomSplashBonusMult = 1 + 0.05*kingdomLevel('siegeengineers');
    kingdomGoldMult = 1 + 0.1*kingdomLevel('treasury');
    kingdomHealAfterBossPct = 0.01*kingdomLevel('healers');
    // Royal Healers also raises Necromancer's dead: +1 skeleton per 5 levels.
    kingdomHealersSkeletonBonus = Math.floor(kingdomLevel('healers')/5);
    kingdomWatchTowerLevel = kingdomLevel('watchtowers');
    kingdomStudyHallLevel = kingdomLevel('studyhall');
    kingdomApprenticeshipLevel = kingdomLevel('apprenticeships');
    kingdomLibraryLevel = kingdomLevel('library');
    kingdomAcademyLevel = kingdomLevel('academy');
    totalBetweenWaveCorrect = 0;
    runDoubleEnemies = false; runGoldMult = 1;
    runNoCardRewards = false; runCorrectAnswersGiveGold = false;

    maxHPBeforeKeep = 100 + kingdomLevel('walls')*5;
    maxHP = maxHPBeforeKeep;
    castleHP = maxHP;
    maxAmmo = 10 + kingdomLevel('warehouse');
    ammo = 3 + kingdomLevel('supplydepot');

    if(kingdomLevel('traininggrounds')>=1){
        let archerCard = allCards.find(c=>c.id==='archer');
        if(archerCard) applyCard(archerCard);
    }
}

// Adds gold respecting the Treasury bonus, the Merchant card's bonus, this
// run's Golden Touch bonus (if equipped), and the gold cap — the single path
// every gold reward goes through.
function addGold(amount){
    gold = Math.min(gold + Math.round(amount*kingdomGoldMult*runGoldMult*(1+merchantGoldBonus)*(1+(runPowerupBonuses.goldentouch||0))), maxGold);
}

// ═══════════════════════════════════════════════════════════════════════════
// SINGLE-RUN POWERUPS — unlocked permanently via lifetime correct answers
// (across every run), but their *strength* is re-calibrated fresh each run by
// a shared 4-question quiz answered before that run starts. More correct, and
// answering faster, makes the equipped powerups stronger for that run only.
// ═══════════════════════════════════════════════════════════════════════════
const RUN_POWERUPS = [
    { id:'luckycharm',     name:'🍀 Lucky Charm',       unlockAt:40  },
    { id:'stageclear',     name:'🏆 Stage Clear Bonus', unlockAt:80  },
    { id:'increasedammo',  name:'🏹 Increased Ammo',    unlockAt:120 },
    { id:'goldentouch',    name:'✨ Golden Touch',       unlockAt:160 },
];
const POWERUP_SLOT_TIERS = [ {min:400,slots:4}, {min:300,slots:3}, {min:200,slots:2}, {min:0,slots:1} ];
function kingdomPowerupSlots(){
    let c = kingdomSave.totalCorrectAnswers;
    return POWERUP_SLOT_TIERS.find(t=>c>=t.min).slots;
}

let pendingUnlockNotifications = [];
function checkKingdomUnlockNotifications(){
    let c = kingdomSave.totalCorrectAnswers;
    let thresholds = [
        ...RUN_POWERUPS.map(p=>({val:p.unlockAt, label:`${p.name} unlocked!`})),
        {val:200, label:'You can now equip 2 powerups at once!'},
        {val:300, label:'You can now equip 3 powerups at once!'},
        {val:400, label:'You can now equip 4 powerups at once!'},
    ];
    thresholds.forEach(t=>{
        if(c>=t.val && !kingdomSave.notifiedThresholds.includes(t.val)){
            kingdomSave.notifiedThresholds.push(t.val);
            pendingUnlockNotifications.push(t.label);
        }
    });
}

// Card ids that just crossed their unlockAt threshold, queued up so the very
// next card-selection screen guarantees that card as one of the choices —
// regardless of its normal rarity weighting — so the player gets to try it
// right away instead of waiting on the random draw.
let pendingCardUnlocks = [];
// Set by Twin Fate: the very next card the player picks (in the very next
// selection screen) gets its normal pick effect applied a second time —
// i.e. a brand new tower comes in pre-upgraded a level, or a repeat pick
// jumps two levels/effect-tiers at once instead of one.
let pendingDoubleNextCard = false;
function checkCardUnlocks(){
    let c = kingdomSave.totalCorrectAnswers;
    allCards.forEach(card=>{
        let at = card.unlockAt||0;
        if(at<=0) return; // starter cards are never "newly" unlocked
        let key = 'card_'+card.id;
        if(c>=at && !kingdomSave.notifiedThresholds.includes(key)){
            kingdomSave.notifiedThresholds.push(key);
            pendingUnlockNotifications.push(`${card.name} unlocked!`);
            pendingCardUnlocks.push(card.id);
        }
    });
}

// Every correct answer anywhere in the game (ammo questions, between-wave
// questions, and the pre-run calibration quiz) counts toward lifetime totals.
function recordCorrectAnswer(){
    kingdomSave.totalCorrectAnswers++;
    checkKingdomUnlockNotifications();
    checkCardUnlocks();
    saveKingdomSave();
}

function toggleEquipPowerup(id){
    let idx = kingdomSave.equippedPowerups.indexOf(id);
    if(idx>=0){ kingdomSave.equippedPowerups.splice(idx,1); }
    else {
        if(kingdomSave.equippedPowerups.length>=kingdomPowerupSlots()) return false;
        kingdomSave.equippedPowerups.push(id);
    }
    saveKingdomSave();
    return true;
}

let runPowerupBonuses = { luckycharm:0, stageclear:0, increasedammo:0, goldentouch:0 };
let prerunQuizCorrect = 0, prerunQuizTimes = [];

function computeRunPowerupBonuses(){
    runPowerupBonuses = { luckycharm:0, stageclear:0, increasedammo:0, goldentouch:0 };
    let correct = prerunQuizCorrect;
    let avgTime = prerunQuizTimes.length ? prerunQuizTimes.reduce((a,b)=>a+b,0)/prerunQuizTimes.length : 10;
    // Speed multiplier: ~3s average or faster is fastest (1.5x), 10s+ average is slowest (0.7x)
    let speedMult = 1.5 - Math.min(1, Math.max(0, (avgTime-3)/7))*0.8;
    kingdomSave.equippedPowerups.forEach(id=>{
        if(id==='luckycharm') runPowerupBonuses.luckycharm = Math.min(0.3, correct*0.05*speedMult);
        if(id==='stageclear') runPowerupBonuses.stageclear = correct*5;
        if(id==='increasedammo') runPowerupBonuses.increasedammo = correct*0.25;
        if(id==='goldentouch') runPowerupBonuses.goldentouch = correct*0.1;
    });
}

// Shared pre-run calibration quiz — only runs if at least one powerup is
// equipped. Runs before the first wave starts.
function runPrerunQuiz(onComplete){
    if(kingdomSave.equippedPowerups.length===0){ computeRunPowerupBonuses(); onComplete(); return; }
    prerunQuizCorrect = 0; prerunQuizTimes = [];
    let qIndex = 0;
    function nextQ(){
        if(qIndex>=4){ computeRunPowerupBonuses(); onComplete(); return; }
        let q = randQ();
        let startTime = performance.now();
        let shuffled = q.a.map((a,i)=>({text:a,correct:i===q.c})).sort(()=>Math.random()-0.5);
        let html = `<div class="modal-overlay"><div class="modal-box"><h2>🎲 Powerup Calibration — Question ${qIndex+1}/4</h2><p style="margin-bottom:8px;color:#8cf;font-size:12px">Answer quickly and correctly to strengthen this run's equipped powerups.</p><p style="margin-bottom:16px">${q.q}</p>`;
        shuffled.forEach(a=>{ html+=`<button class="choice-btn" data-correct="${a.correct}">${a.text}</button>`; });
        html+=`</div></div>`;
        modalRoot.innerHTML = html;
        modalRoot.querySelectorAll('.choice-btn').forEach(btn=>{
            btn.onclick=()=>{
                let elapsed = (performance.now()-startTime)/1000;
                let isCorrect = btn.dataset.correct==='true';
                prerunQuizTimes.push(elapsed);
                if(isCorrect){ btn.classList.add('correct'); prerunQuizCorrect++; recordCorrectAnswer(); }
                else { btn.classList.add('wrong'); modalRoot.querySelectorAll('.choice-btn').forEach(b=>{ if(b.dataset.correct==='true') b.classList.add('correct'); }); }
                modalRoot.querySelectorAll('.choice-btn').forEach(b=>b.onclick=null);
                qIndex++;
                setTimeout(nextQ, 800);
            };
        });
    }
    nextQ();
}

// ── Weather system ──────────────────────────────────────────────────────────
// Pity-based random weather: each effect starts at 1% chance per roll and
// climbs +1% every roll it doesn't trigger; the moment it triggers its own
// chance resets to 1%. Guarantees no effect stays dormant forever, and the
// same effect can't realistically repeat back-to-back.
const WEATHER_EFFECTS = [
    { id:'rain',     name:'🌧️ Rain',          desc:'Fire towers deal 50% less damage' },
    { id:'fog',      name:'🌫️ Fog',           desc:'Tower range reduced by 50%' },
    { id:'night',    name:'🌙 Night',          desc:'Enemies spawn much faster' },
    { id:'eclipse',  name:'🌑 Solar Eclipse',  desc:'Enemies are 50% stronger, tougher & faster' },
    { id:'blizzard', name:'❄️ Blizzard',       desc:'Towers fire 50% slower' },
];
let weatherPity = {};
WEATHER_EFFECTS.forEach(w => weatherPity[w.id] = 1);
let activeWeather = null;      // id from WEATHER_EFFECTS, or null (clear)
let weatherWavesLeft = 0;      // waves remaining before the next re-roll

function rollWeather(){
    let ids = shuffle(WEATHER_EFFECTS.map(w=>w.id));
    let winner = null;
    for(let id of ids){
        if(Math.random()*100 < weatherPity[id]){ winner = id; break; }
    }
    WEATHER_EFFECTS.forEach(w=>{
        weatherPity[w.id] = (w.id===winner) ? 1 : Math.min(100, weatherPity[w.id]+1);
    });
    activeWeather = winner;
    weatherWavesLeft = 3; // weather lasts ~3 waves before the next roll
}

// Resistance mechanic: some enemies (e.g. Leshy) are only efficiently damaged
// by a specific source (a named tower id, or 'player' for manually-fired arrows).
// Everything else still works, just at a steep penalty, so the fight is never
// literally unwinnable if the player skipped that tower — just very slow.
function getResistanceMult(e, sourceId){
    if(e.onlyVulnerableTo) return e.onlyVulnerableTo.includes(sourceId) ? 1 : (e.resistMult!==undefined?e.resistMult:0.15);
    if(e.resist) return e.resist.includes(sourceId) ? (e.resistMult!==undefined?e.resistMult:0.5) : 1;
    return 1;
}

// Shared damage application + death handling, used by direct hits, splash
// damage, and poison ticks alike — so gold/kills/undead-rising are always
// credited consistently no matter which source did the killing blow.
function applyDamageToEnemy(e, rawDmg, sourceId){
    if(!e || e.dead) return;
    let dmgDealt = rawDmg * getResistanceMult(e, sourceId);
    if(e.shieldActive) dmgDealt *= (1-e.shieldReduction);
    e.hp -= dmgDealt;
    if(e.hp<=0){
        e.dead=true;
        kills++;
        let goldReward = e.isWagon ? treasureGoldBonus : 2;
        addGold(goldReward*waveGoldMult);
        if(activeAffix==='undead' && e.type!=='wagon' && e.type!=='skeleton' && e.type!=='boss'){
            enemies.push(spawnEnemy('skeleton', e.x));
        }
    }
}

function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
}

// Loads a question bank by teacher/subject code, e.g. "93bf" -> Year 9 Biology.
// A valid code is REQUIRED — there is no general-knowledge fallback, so an
// empty or unrecognised code always fails and the game cannot start.
// Bank files use the format: [{ "q": "...", "o": ["opt1","opt2","opt3","opt4"], "a": correctIndex }, ...]
async function loadQuestionBank(code) {
    code = (code||'').trim().toLowerCase();
    if(!code) return { ok:false, error:'code-required' };
    const entry = QUESTION_BANK_FILES[code];
    if(!entry) return { ok:false, error:'code-not-found' };
    try {
        const bankRes = await fetch(entry.file, {cache:'no-store'});
        if(!bankRes.ok) throw new Error('bank fetch failed');
        const bankData = await bankRes.json();
        if(!Array.isArray(bankData) || bankData.length===0) throw new Error('empty bank');
        questions = bankData.map(item => ({ q:item.q, a:item.o, c:item.a }));
        currentBankName = entry.name || code.toUpperCase();
        currentBankCode = code;
        return { ok:true, name: currentBankName };
    } catch(err) {
        console.error('Failed to load question bank:', err);
        return { ok:false, error:'fetch-failed' };
    }
}

// Tower upgrade cycle definitions
const towerUpgradeCycles = {
    archer: ['dmg','range','rate'],
    ballista: ['dmg','range','rate'],
    cannon: ['dmg','splash','rate'],
    firemage: ['dmg','range','rate'],
    icemage: ['range','rate','range'],
    axeman: ['dmg','rate','range'],
    necromancer: ['count','rate','dmg'],
};

// Only cards the player has unlocked (see allCards[].unlockAt and
// checkCardUnlocks) can ever be drawn into a card-selection screen.
function getUnlockedCards(){
    return allCards.filter(c => (c.unlockAt||0) <= kingdomSave.totalCorrectAnswers);
}

function pickCards(n) {
    let pool = getUnlockedCards();
    let picked = [];
    let guard = 0;
    while(picked.length < n && picked.length < pool.length && guard < 500){
        guard++;
        let groupPool = [];
        pool.forEach(c => { for(let j=0;j<c.groupWeight;j++) groupPool.push(c.group); });
        if(!groupPool.length) break;
        let selectedGroup = groupPool[Math.floor(Math.random()*groupPool.length)];
        let cardsInGroup = pool.filter(c => c.group === selectedGroup);
        let cardPool = [];
        cardsInGroup.forEach(c => { for(let j=0;j<c.cardWeight;j++) cardPool.push(c); });
        let card = cardPool[Math.floor(Math.random()*cardPool.length)];
        if(!picked.find(p=>p.id===card.id)) picked.push(card);
    }
    return picked;
}

// City layout: towers placed at the base of the castle, spreading out
function getTowerPosition(index) {
    // Base of castle is around y=220, castle center x ~75
    // Spread towers left and right at base, in rows
    const baseY = 222;
    const centerX = 75;
    const spacing = 22;
    const row = Math.floor(index / 6);
    const col = index % 6;
    // Alternate left/right from center
    const offsets = [-2, -1, 0, 1, 2, 3];
    const x = centerX + offsets[col] * spacing - 10;
    const y = baseY + row * 18;
    return {x, y};
}

function applyCard(card) {
    if(card.type === 'tower') {
        // Check if we already have this tower type
        let existing = towers.find(t => t.id === card.id);
        if(existing) {
            // Upgrade existing tower with cycling stats
            existing.level = (existing.level || 1) + 1;
            let cycle = towerUpgradeCycles[card.id] || ['dmg','range','rate'];
            let upgradeIdx = (existing.level - 2) % cycle.length;
            let stat = cycle[upgradeIdx];
            if(stat === 'dmg') existing.dmg = Math.floor(existing.dmg * 1.4);
            else if(stat === 'range'){ existing.rangePercent = Math.min(100, Math.floor(existing.rangePercent * 1.25)); existing.range = Math.floor(existing.rangePercent * GAME_W / 100); }
            else if(stat === 'rate') existing.rate = Math.max(10, Math.floor(existing.rate * 0.75));
            else if(stat === 'splash') existing.splash = (existing.splash || 30) + 15;
            else if(stat === 'count') existing.skeletonCount = (existing.skeletonCount || 1) + 1;
            addTownBuilding();
            return;
        }
        // New tower - place at base like a city
        let pos = getTowerPosition(towers.length);
        towers.push({...card, level:1, x: pos.x, y: pos.y, cooldown:0});
        addTownBuilding();
    }
    // All other upgrades also grow the town
    if(card.type !== 'tower') {
        addTownBuilding();
    }
    if(card.type === 'tower') return; // tower placement/upgrade already handled + returned above for existing towers, and applied above for new ones

    // Non-tower cards: bump this card's own level, then every effect below
    // scales off getCardEffectMult(card.id) — 1x on first pick, 1.5x on the
    // second, 2.25x on the third, etc. Recomputed fresh each time (not
    // multiplied in place) so order-of-pickup never matters.
    cardLevels[card.id] = (cardLevels[card.id]||0) + 1;
    cards.push({...card, level:cardLevels[card.id]});
    let m = getCardEffectMult(card.id);

    if(card.id==='goldmine') goldMines = 1; // presence flag; magnitude read via getCardEffectMult at wave start
    if(card.id==='storehouse'){ maxAmmo+=Math.round(5*m); maxGold+=Math.round(50*m); }
    if(card.id==='repair') wallHP+=Math.round(10*m);
    if(card.id==='stonewalls'){ let bonus=Math.round(30*m); maxHPBeforeKeep+=bonus; recomputeMaxHP(); castleColor='#667799'; }
    if(card.id==='moat') hasMoat=true; // magnitude (slow strength) read via getCardEffectMult('moat') where the slow is applied
    if(card.id==='priest') priestHeal=true; // magnitude read via getCardEffectMult('priest') at heal time
    if(card.id==='dragon') hasDragon=true; // magnitude read via getCardEffectMult('dragon') when it breathes fire
    if(card.id==='wizard') hasWizard=true; // magnitude read via getCardEffectMult('wizard') when it casts
    if(card.id==='keep') recomputeMaxHP();
    if(card.id==='elite') hasElite=true; // shot count read via getCardLevel('elite') on manual fire
    if(card.id==='meteor_card') hasMeteor=true; // magnitude read via getCardEffectMult('meteor_card') on impact
    if(card.id==='theking') hasKing=true;
    if(card.id==='twinfate') pendingDoubleNextCard = true; // consumed by the next card the player picks, see showCardSelect's click handler
    recomputeGlobalMultipliers();
}

function spawnEnemy(type, x) {
    let e = {x: x||GAME_W+10, y: 225+Math.random()*20, type, frame:0, frameTimer:0, hp:10, maxHp:10, speed:0.4, dmg:5, frozen:0, dead:false, deathTimer:0};
    // Goblin and Skeleton counts already grow with wave² (see ENEMY_SPAWN_TABLE)
    // so their HP is fixed rather than also scaling with wave — otherwise late
    // waves would combine a quadratically-growing swarm with individually
    // tankier units too, compounding into an unfair difficulty spike.
    if(type==='goblin'){e.hp=5;e.speed=0.5;e.dmg=3;}
    if(type==='skeleton'){e.hp=15;e.speed=0.35;e.dmg=5;}
    if(type==='knight'){e.hp=25+wave*3;e.speed=0.3;e.dmg=8;}
    if(type==='wolf'){e.hp=6+wave;e.speed=0.8;e.dmg=4;}
    if(type==='siege'){e.hp=75+wave*5;e.speed=0.2;e.dmg=15;}
    if(type==='wagon'){e.hp=15+wave;e.speed=0.4;e.dmg=0;e.isWagon=true;}
    if(type==='goblin_scout'){e.hp=3+wave;e.speed=0.9;e.dmg=2;}
    if(type==='goblin_armored'){e.hp=14+wave*3;e.speed=0.35;e.dmg=4;e.resist=['archer','axeman','ballista','cannon','player'];e.resistMult=0.5;}
    if(type==='wolf_dire'){e.hp=16+wave*2;e.speed=0.7;e.dmg=7;}
    if(type==='shade'){e.hp=12+wave*2;e.speed=0.45;e.dmg=5;e.resist=['firemage','icemage'];e.resistMult=0.4;}
    if(type==='leshy'){e.hp=30+wave*4;e.speed=0.25;e.dmg=6;e.onlyVulnerableTo=['firemage'];e.resistMult=0.12;}
    if(type==='wisphawk'){e.hp=10+wave*2;e.speed=0.7;e.dmg=3;e.onlyVulnerableTo=['archer'];e.resistMult=0.12;}
    if(type==='brambletreant'){e.hp=26+wave*3;e.speed=0.22;e.dmg=6;e.onlyVulnerableTo=['axeman'];e.resistMult=0.12;}
    if(type==='embersalamander'){e.hp=20+wave*3;e.speed=0.4;e.dmg=5;e.onlyVulnerableTo=['icemage'];e.resistMult=0.12;}
    if(type==='irongolem'){e.hp=45+wave*5;e.speed=0.2;e.dmg=9;e.onlyVulnerableTo=['ballista'];e.resistMult=0.12;}
    if(type==='bombbeetle'){e.hp=35+wave*4;e.speed=0.3;e.dmg=7;e.onlyVulnerableTo=['cannon'];e.resistMult=0.12;}
    if(type==='golemsentinel'){e.hp=40+wave*5;e.speed=0.25;e.dmg=8;e.onlyVulnerableTo=['lightning'];e.resistMult=0.12;}
    if(type==='rottedrevenant'){e.hp=32+wave*4;e.speed=0.28;e.dmg=6;e.onlyVulnerableTo=['poison'];e.resistMult=0.12;}
    if(type==='skyraider'){e.hp=8+wave*1.8;e.speed=0.95;e.dmg=4+Math.floor(wave/10);e.flying=true;}
    if(type==='wyvern'){e.hp=34+wave*4;e.speed=0.22;e.dmg=9+Math.floor(wave/8);e.flying=true;}
    if(type==='stoneburrower'){e.hp=40+wave*5;e.speed=0.18;e.dmg=6+Math.floor(wave/12);e.underground=true;}
    if(type==='graveworm'){e.hp=18+wave*2.5;e.speed=0.16;e.dmg=11+Math.floor(wave/6);e.underground=true;}
    if(type==='boss'){
        let def = currentBossDef || bossDefs[0];
        // Base numbers bumped up across the board, and damage/speed now scale
        // with wave too (previously only HP did) — a wave 40 boss should feel
        // meaningfully scarier than a reskinned wave 10 boss, not just spongier.
        e.hp=Math.floor((130+wave*26)*def.hpMult);
        e.speed=(0.25+Math.min(0.18, wave*0.0035))*def.speedMult;
        e.dmg=Math.floor((22+wave*0.7)*def.dmgMult);
        e.y=230;
        e.bossDef=def;
        e.bossId=def.id;
        e.abilityTimers={ summon:0, ranged:0, dash:0, shieldOn:0, shieldOff:0, lifesteal:0, freeze:0 };
        e.shieldActive=false;
        e.shieldReduction=0;
        e.enraged=false;
    }
    if(activeWeather==='eclipse' && type!=='wagon'){
        e.hp=Math.ceil(e.hp*1.5);
        e.speed*=1.5;
        e.dmg=Math.ceil(e.dmg*1.5);
    }
    e.maxHp=e.hp;
    return e;
}

// Runs each frame for a living boss enemy: handles summon/ranged/dash/shield/lifesteal/freeze/enrage abilities.
// Every ability reads its base numbers straight off bossDef (shared/reused
// across every boss fight), then scales them live off the CURRENT wave —
// never mutates the shared def itself, so there's no risk of compounding
// across multiple boss fights or multiple simultaneous bosses.
function bossUpdate(e){
    if(!e.bossDef) return;
    e.bossDef.abilities.forEach(ab=>{
        if(ab.type==='summon'){
            let rate = Math.max(40, ab.rate - wave*1.0); // summons more often at higher waves
            e.abilityTimers.summon++;
            if(e.abilityTimers.summon>=rate){
                e.abilityTimers.summon=0;
                let minion = spawnEnemy(ab.enemyType, e.x - 10 + Math.random()*20);
                enemies.push(minion);
                particles.push({x:e.x,y:e.y,vx:0,vy:-1,life:20,color:'#66ff88',size:5});
                // At high waves it calls up reinforcements two at a time.
                if(wave>=25){
                    let minion2 = spawnEnemy(ab.enemyType, e.x - 10 + Math.random()*20);
                    enemies.push(minion2);
                }
            }
        } else if(ab.type==='ranged'){
            let rate = Math.max(50, ab.rate - wave*0.6); // fires faster at higher waves
            let dmg = Math.round(ab.dmg + wave*0.35); // hits harder at higher waves
            e.abilityTimers.ranged++;
            if(e.abilityTimers.ranged>=rate){
                e.abilityTimers.ranged=0;
                castleHP=Math.max(0,castleHP-dmg);
                let col = ab.effect==='lightning' ? '#aaeeff' : '#ff6600';
                for(let i=0;i<6;i++){
                    let t=i/6;
                    particles.push({x:e.x-(e.x-70)*t,y:e.y-(e.y-160)*t,vx:0,vy:0,life:12,color:col,size:6});
                }
            }
        } else if(ab.type==='dash'){
            let rate = Math.max(70, ab.rate - wave*0.8); // dashes more often at higher waves
            let dist = ab.dist + wave*0.5; // dashes further at higher waves
            e.abilityTimers.dash++;
            if(e.abilityTimers.dash>=rate){
                e.abilityTimers.dash=0;
                e.x=Math.max(105,e.x-dist);
                for(let i=0;i<8;i++) particles.push({x:e.x+dist*Math.random(),y:e.y,vx:0,vy:0,life:15,color:'#8833cc',size:4});
            }
        } else if(ab.type==='shield'){
            let onRate = Math.max(90, ab.onRate - wave*0.8); // shields up more often at higher waves
            let reduction = Math.min(0.88, ab.reduction + wave*0.004); // blocks more damage at higher waves
            if(e.shieldActive){
                e.abilityTimers.shieldOff++;
                if(e.abilityTimers.shieldOff>=ab.duration){ e.shieldActive=false; e.abilityTimers.shieldOff=0; }
            } else {
                e.abilityTimers.shieldOn++;
                if(e.abilityTimers.shieldOn>=onRate){ e.shieldActive=true; e.shieldReduction=reduction; e.abilityTimers.shieldOn=0; }
            }
        } else if(ab.type==='lifesteal'){
            let rate = Math.max(25, ab.rate - wave*0.35); // heals more often at higher waves
            let amt = ab.amt + wave*0.15; // heals more per tick at higher waves
            e.abilityTimers.lifesteal++;
            if(e.abilityTimers.lifesteal>=rate){
                e.abilityTimers.lifesteal=0;
                if(e.hp<e.maxHp){ e.hp=Math.min(e.maxHp,e.hp+amt); particles.push({x:e.x,y:e.y,vx:0,vy:-1,life:18,color:'#ff0044',size:4}); }
            }
        } else if(ab.type==='freeze_towers'){
            let rate = Math.max(130, ab.rate - wave*0.7); // freezes more often at higher waves
            let duration = ab.duration + wave*0.6; // freezes for longer at higher waves
            e.abilityTimers.freeze++;
            if(e.abilityTimers.freeze>=rate){
                e.abilityTimers.freeze=0;
                towersFrozen=duration;
                particles.push({x:e.x,y:e.y,vx:0,vy:-1,life:20,color:'#aaeeff',size:6});
            }
        } else if(ab.type==='enrage'){
            let speedMult = ab.speedMult + Math.min(0.6, wave*0.01); // enrage hits harder at higher waves
            if(!e.enraged && e.hp/e.maxHp<=ab.threshold){
                e.enraged=true;
                e.speed*=speedMult;
            }
        }
    });
}

let spawnQueue=[], spawnTimer=0;

// Which towers can actually hit flying / underground enemies — a fixed,
// designed split (not randomized per run) so players can learn and plan
// around it. Each list is roughly half the roster, and the two lists are
// deliberately complementary: your anti-air squad (ranged/magic attacks
// that can reach upward) is exactly the squad that can't reach burrowers,
// and vice versa for your anti-burrower squad (explosive/toxic/freezing/
// grave-magic effects that work at or below ground level).
// 'player' is included in FLYING_CAPABLE_TOWERS since manually-fired arrows
// behave like the Archer Tower's shots.
const FLYING_CAPABLE_TOWERS = ['archer','ballista','firemage','lightning','player'];
const UNDERGROUND_CAPABLE_TOWERS = ['cannon','poison','icemage','necromancer'];
function canTowerHit(sourceId, e){
    if(e.flying && !FLYING_CAPABLE_TOWERS.includes(sourceId)) return false;
    if(e.underground && !UNDERGROUND_CAPABLE_TOWERS.includes(sourceId)) return false;
    return true;
}

// Per-type wave composition. Goblin/Skeleton counts grow with wave² (explosive
// swarm growth by design); Knight/Wolf/Siege stay linear (rarer elite units).
// Variants (scout/armored/dire/shade/leshy) layer extra variety on top, Bloons-style —
// some resist most towers and are only efficient to kill with a specific counter.
// skyraider/wyvern fly (see FLYING_CAPABLE_TOWERS); stoneburrower/graveworm
// travel underground (see UNDERGROUND_CAPABLE_TOWERS).
const ENEMY_SPAWN_TABLE = [
    { type:'goblin',          unlock:1,  count:(w)=> 2 + w*w },
    { type:'goblin_scout',    unlock:2,  count:(w)=> Math.floor(w/2) },
    { type:'skeleton',        unlock:3,  count:(w)=> w*w },
    { type:'wisphawk',        unlock:4,  count:(w)=> Math.max(1, Math.floor(w/7)) },
    { type:'goblin_armored',  unlock:5,  count:(w)=> Math.floor(w/2) },
    { type:'brambletreant',   unlock:6,  count:(w)=> Math.max(1, Math.floor(w/7)) },
    { type:'knight',          unlock:6,  count:(w)=> w },
    { type:'skyraider',       unlock:7,  count:(w)=> Math.max(1, Math.floor(w/6)) },
    { type:'leshy',           unlock:8,  count:(w)=> Math.max(1, Math.floor(w/6)) },
    { type:'shade',           unlock:9,  count:(w)=> Math.floor(w/3) },
    { type:'wolf',            unlock:9,  count:(w)=> w*2 },
    { type:'stoneburrower',   unlock:10, count:(w)=> Math.max(1, Math.floor(w/7)) },
    { type:'embersalamander', unlock:10, count:(w)=> Math.max(1, Math.floor(w/7)) },
    { type:'wolf_dire',       unlock:11, count:(w)=> Math.floor(w/3) },
    { type:'siege',           unlock:12, count:(w)=> Math.round(w/2) },
    { type:'irongolem',       unlock:13, count:(w)=> Math.max(1, Math.floor(w/8)) },
    { type:'wyvern',          unlock:14, count:(w)=> Math.max(1, Math.floor(w/8)) },
    { type:'graveworm',       unlock:17, count:(w)=> Math.max(1, Math.floor(w/8)) },
    { type:'bombbeetle',      unlock:16, count:(w)=> Math.max(1, Math.floor(w/8)) },
    { type:'golemsentinel',   unlock:19, count:(w)=> Math.max(1, Math.floor(w/8)) },
    { type:'rottedrevenant',  unlock:22, count:(w)=> Math.max(1, Math.floor(w/8)) },
];

// Caps how many enemies can be alive at once. Wave counts grow quadratically,
// so without this cap a late wave could spawn hundreds of enemies in a way
// that bogs down the browser; spawning just pauses (queue is untouched) until
// the alive count drops back below the cap, then resumes automatically.
const MAX_ALIVE_ENEMIES = 150;

// Sum of every permanent Kingdom upgrade's level, across all 16 upgrades —
// used to make more heavily-invested players face a faster-paced game.
function totalKingdomUpgradesPurchased(){
    return KINGDOM_UPGRADES.reduce((sum,u)=> sum + kingdomLevel(u.id), 0);
}

// Spawn interval starts at 50 frames and drops by (2 + total Kingdom
// upgrades purchased) for every wave reached — e.g. wave 3 with 2 upgrades
// purchased is 50 - 3*(2+2) = 38 frames. Once that would go below 2 frames,
// the interval locks at 2 and the leftover "speed" instead spawns extra
// enemies per tick, so the pace keeps escalating instead of hitting a wall.
// Night weather halves whatever interval this produces on top of that.
function getSpawnParams(){
    let totalUpgrades = totalKingdomUpgradesPurchased();
    let raw = 50 - wave*(2+totalUpgrades);
    let interval = Math.max(2, raw);
    let batchSize = raw<2 ? 1+Math.floor(2-raw) : 1;
    if(activeWeather==='night') interval = Math.max(1, Math.floor(interval/2));
    return {interval, batchSize};
}

function startWave() {
    wave++;
    if(runPowerupBonuses.stageclear>0) addGold(runPowerupBonuses.stageclear);
    if(goldMines) addGold(Math.round(5*getCardEffectMult('goldmine')));
    if(wallHP>0) castleHP=Math.min(castleHP+wallHP, maxHP);
    if(priestHeal) castleHP=Math.min(castleHP+Math.round(5*getCardEffectMult('priest')), maxHP);
    spawnQueue=[];
    waveGoldMult=1; waveDmgMult=1; waveContactDmgMult=1;
    activeAffix=null;

    let isBossWave = (wave%5===0) || forceBossThisWave;
    forceBossThisWave=false;
    lastWaveWasBoss = isBossWave;

    // Weather doesn't re-roll on boss waves — it carries over.
    let weatherChanged=false;
    if(!isBossWave){
        if(weatherPreRolledForNextWave){
            weatherPreRolledForNextWave=false;
            weatherChanged=true; // already rolled early by Watch Towers; just show the result
        } else {
            weatherWavesLeft--;
            if(weatherWavesLeft<=0){ let prev=activeWeather; rollWeather(); weatherChanged=(activeWeather!==prev); }
        }
    }

    if(isBossWave){ showBoss(); return; }

    let isPreBoss = (wave+1)%5===0;
    if(isPreBoss) activeAffix = AFFIX_DEFS[Math.floor(Math.random()*AFFIX_DEFS.length)].id;
    if(activeAffix==='cindermarch') waveContactDmgMult *= 1.5; // fire-touched enemies hit harder up close

    let doubleEnemies = forceNextWaveDoubleEnemies || runDoubleEnemies;
    forceNextWaveDoubleEnemies=false;
    buildWaveComposition(doubleEnemies);

    if(skipThisWaveSpawns){ skipThisWaveSpawns=false; spawnQueue=[]; }

    let affixDef = AFFIX_DEFS.find(a=>a.id===activeAffix);
    if(weatherChanged || affixDef){
        showWaveAnnouncement(weatherChanged, affixDef);
    } else {
        state='playing'; spawnTimer=0; updateHUD();
    }
}

function buildWaveComposition(doubleEnemies){
    let baseCounts = {};
    ENEMY_SPAWN_TABLE.forEach(spec=>{
        baseCounts[spec.type] = (wave>=spec.unlock) ? Math.max(0, Math.floor(spec.count(wave))) : 0;
    });
    if(doubleEnemies) Object.keys(baseCounts).forEach(k=>baseCounts[k]*=2);
    let total = Object.values(baseCounts).reduce((a,b)=>a+b,0);

    if(activeAffix==='horde') spawnQueue = Array(total).fill('goblin');
    else if(activeAffix==='siege') spawnQueue = Array(wave).fill('siege');
    else if(activeAffix==='wolves') spawnQueue = Array(total).fill('wolf');
    else if(activeAffix==='guard') spawnQueue = Array(total).fill('knight');
    else if(activeAffix==='caravan') spawnQueue = Array(Math.max(6,total)).fill('wagon');
    else if(activeAffix==='ironlegion'){
        // Tanky, resistance-heavy specialists — punishes one-tower spam.
        let types=['goblin_armored','irongolem','golemsentinel','bombbeetle'].filter(t=> wave>=ENEMY_SPAWN_TABLE.find(s=>s.type===t).unlock);
        if(types.length===0) types=['goblin'];
        let perType = Math.max(2, Math.floor(total/(types.length*4)));
        spawnQueue=[];
        types.forEach(t=>{ for(let i=0;i<perType;i++) spawnQueue.push(t); });
    }
    else if(activeAffix==='skyswarm'){
        // Fast, fragile, and overwhelming in number — a splash-damage check.
        let types=['goblin_scout','wisphawk','wolf'].filter(t=> wave>=ENEMY_SPAWN_TABLE.find(s=>s.type===t).unlock);
        if(types.length===0) types=['goblin'];
        let perType = Math.max(6, Math.floor(total/types.length));
        spawnQueue=[];
        types.forEach(t=>{ for(let i=0;i<perType;i++) spawnQueue.push(t); });
    }
    else if(activeAffix==='cindermarch'){
        // Fire-touched enemies; castle contact damage is also boosted for this wave — see startWave().
        let types=['embersalamander','bombbeetle'].filter(t=> wave>=ENEMY_SPAWN_TABLE.find(s=>s.type===t).unlock);
        if(types.length===0) types=['goblin'];
        let perType = Math.max(4, Math.floor(total/types.length));
        spawnQueue=[];
        types.forEach(t=>{ for(let i=0;i<perType;i++) spawnQueue.push(t); });
    }
    else if(activeAffix==='mixedvanguard'){
        // One of every "onlyVulnerableTo" specialist — no single tower type clears this alone.
        let types=['leshy','wisphawk','brambletreant','embersalamander','irongolem','bombbeetle','golemsentinel','rottedrevenant'].filter(t=> wave>=ENEMY_SPAWN_TABLE.find(s=>s.type===t).unlock);
        if(types.length===0) types=['goblin'];
        let perType = Math.max(3, Math.floor(total/types.length));
        spawnQueue=[];
        types.forEach(t=>{ for(let i=0;i<perType;i++) spawnQueue.push(t); });
    }
    else {
        // 'vanguard' (Swift Vanguard) also falls through to here — its enemies
        // are the normal wave composition, just faster (see the movement loop).
        spawnQueue=[];
        Object.entries(baseCounts).forEach(([t,n])=>{ for(let i=0;i<n;i++) spawnQueue.push(t); });
    }
    shuffle(spawnQueue);
}

function showWaveAnnouncement(weatherChanged, affixDef){
    state='boss'; // reuse the same input-blocking state as the boss splash
    let w = WEATHER_EFFECTS.find(x=>x.id===activeWeather);
    let html = `<div class="boss-splash"><div style="font-size:14px;letter-spacing:8px">═══════════════════</div>`;
    if(weatherChanged){
        html += w ? `<div style="font-size:24px;margin:12px 0">${w.name}</div><div style="font-size:13px;color:#ffaacc">${w.desc}</div>`
                  : `<div style="font-size:22px;margin:12px 0">☀️ Clear Skies</div><div style="font-size:13px;color:#ffaacc">The weather settles</div>`;
    }
    if(affixDef){
        html += `<div style="font-size:24px;margin:12px 0">${affixDef.name}</div><div style="font-size:13px;color:#ffaacc">${affixDef.desc}</div>`;
    }
    html += `<div style="font-size:14px;letter-spacing:8px;margin-top:12px">═══════════════════</div></div>`;
    modalRoot.innerHTML=html;
    setTimeout(()=>{
        modalRoot.innerHTML='';
        state='playing'; spawnTimer=0; updateHUD();
    },2200);
}

function showBoss(){
    state='boss';
    let def = bossDefs[Math.floor(Math.random()*bossDefs.length)];
    currentBossDef = def;
    modalRoot.innerHTML=`<div class="boss-splash"><div style="font-size:14px;letter-spacing:8px">═══════════════════</div><div style="font-size:28px;margin:16px 0">⚔️ BOSS WAVE ⚔️</div><div style="font-size:20px">${def.name}</div><div style="font-size:13px;margin-top:8px;color:#ffaacc">${def.title}</div><div style="font-size:14px;letter-spacing:8px;margin-top:12px">═══════════════════</div></div>`;
    setTimeout(()=>{
        modalRoot.innerHTML='';
        state='playing';
        spawnQueue=[];
        let bossCount = 1+Math.floor(wave/10);
        for(let i=0;i<bossCount;i++) spawnQueue.push('boss');
        def.abilities.forEach(ab=>{
            if(ab.type==='bodyguard'){
                // More escorts at higher waves, and each extra simultaneous
                // boss brings its own full retinue rather than sharing one.
                let count = (ab.count + Math.floor(wave/8)) * bossCount;
                for(let i=0;i<count;i++) spawnQueue.push(ab.enemyType);
            }
        });
        for(let i=0;i<wave;i++) spawnQueue.push('goblin');
        spawnTimer=0;
    },2500);
}

function startBetweenWave(){
    state='between';
    if(pendingFreeTowerAfterBoss){
        pendingFreeTowerAfterBoss=false;
        let towerCards = getUnlockedCards().filter(c=>c.type==='tower');
        if(towerCards.length) applyCard(towerCards[Math.floor(Math.random()*towerCards.length)]);
    }
    let nextWave = wave+1;
    let nextIsBoss = nextWave%5===0;
    let merchantAppears;
    if(pendingMerchantRoll!==null){ merchantAppears = pendingMerchantRoll; pendingMerchantRoll=null; }
    else { merchantAppears = !nextIsBoss && Math.random()<0.05; }
    if(!nextIsBoss && merchantAppears){
        showMerchant(()=>{ betweenWaveQuestions=0; betweenWaveCorrect=0; askBetweenQuestion(); });
    } else {
        betweenWaveQuestions=0; betweenWaveCorrect=0;
        askBetweenQuestion();
    }
}

function showMerchant(onDone){
    let offer = MERCHANT_OFFERS[Math.floor(Math.random()*MERCHANT_OFFERS.length)];
    modalRoot.innerHTML=`<div class="modal-overlay"><div class="modal-box" style="text-align:center">

        <div style="background:rgba(0,0,0,0.3);border:1px solid #6a0572;border-radius:8px;padding:14px;margin:16px 0;text-align:left">
            <div style="font-size:16px;font-weight:bold;color:#ffcc44;margin-bottom:8px">${offer.name}</div>
            <div style="font-size:13px;color:#ff6666;margin-bottom:4px">⚠️ Risk: ${offer.risk}</div>
            <div style="font-size:13px;color:#66ff88">✨ Reward: ${offer.reward}</div>
        </div>
        <div style="display:flex;gap:10px;justify-content:center">
            <button class="choice-btn" id="merchant-accept">Accept the deal</button>
            <button class="choice-btn" id="merchant-decline">Walk away</button>
        </div>
    </div></div>`;
    document.getElementById('merchant-accept').onclick=()=>{ offer.apply(); modalRoot.innerHTML=''; onDone(); };
    document.getElementById('merchant-decline').onclick=()=>{ modalRoot.innerHTML=''; onDone(); };
}

// Study Hall + Apprenticeships trigger together every 4th cumulative correct
// between-wave answer across the whole run (not just a perfect 4/4 session).
function grantEducationMilestoneReward(){
    if(kingdomStudyHallLevel>0){
        addGold(5*kingdomStudyHallLevel);
        particles.push({x:70,y:150,vx:0,vy:-1,life:30,color:'#ffcc00',size:6});
    }
    if(kingdomApprenticeshipLevel>0 && towers.length>0){
        let rateTarget = towers[Math.floor(Math.random()*towers.length)];
        rateTarget.apprenticeRateBonus = (rateTarget.apprenticeRateBonus||0) + 0.005*kingdomApprenticeshipLevel;
        let dmgTarget = towers[Math.floor(Math.random()*towers.length)];
        if(dmgTarget.id==='icemage'){
            dmgTarget.apprenticeFreezeBonus = (dmgTarget.apprenticeFreezeBonus||0) + 0.1*kingdomApprenticeshipLevel;
        } else if(dmgTarget.id==='poison'){
            dmgTarget.apprenticeSplashBonus = (dmgTarget.apprenticeSplashBonus||0) + 0.05*kingdomApprenticeshipLevel;
        } else {
            dmgTarget.apprenticeDmgBonus = (dmgTarget.apprenticeDmgBonus||0) + 0.5*kingdomApprenticeshipLevel;
        }
    }
}

function askBetweenQuestion(){
    if(betweenWaveQuestions>=4){ showCardSelect(); return; }
    let q=randQ();
    let shuffled = q.a.map((a,i)=>({text:a,correct:i===q.c})).sort(()=>Math.random()-0.5);
    let html=`<div class="modal-overlay"><div class="modal-box"><h2>Between Waves — Question ${betweenWaveQuestions+1}/4</h2><p style="margin-bottom:16px">${q.q}</p>`;
    shuffled.forEach((a,i)=>{ html+=`<button class="choice-btn" data-correct="${a.correct}">${a.text}</button>`; });
    html+=`</div></div>`;
    modalRoot.innerHTML=html;
    modalRoot.querySelectorAll('.choice-btn').forEach(btn=>{
        btn.onclick=()=>{
            let isCorrect=btn.dataset.correct==='true';
            if(isCorrect){
                btn.classList.add('correct');
                betweenWaveCorrect++;
                totalBetweenWaveCorrect++;
                recordCorrectAnswer();
                if(totalBetweenWaveCorrect%4===0) grantEducationMilestoneReward();
                if(runCorrectAnswersGiveGold){
                    // Midas Run: no more card rewards this run, so correct
                    // answers pay out directly in gold instead.
                    addGold(10 + Math.floor(wave*0.5));
                }
            }
            else { btn.classList.add('wrong'); modalRoot.querySelectorAll('.choice-btn').forEach(b=>{ if(b.dataset.correct==='true') b.classList.add('correct'); }); }
            modalRoot.querySelectorAll('.choice-btn').forEach(b=>b.onclick=null);
            betweenWaveQuestions++;
            setTimeout(askBetweenQuestion, 800);
        };
    });
}

// Enemies that are only efficiently damaged by one specific tower (everything
// else still works, just at a steep penalty — see getResistanceMult).
const ENEMY_SINGLE_COUNTER = {
    wisphawk:        { tower:'archer',    name:'Wisp Hawk 🦅' },
    brambletreant:   { tower:'axeman',    name:'Bramble Treant 🌲' },
    leshy:           { tower:'firemage',  name:'Leshy 🌳' },
    embersalamander: { tower:'icemage',   name:'Ember Salamander 🦎' },
    irongolem:       { tower:'ballista',  name:'Iron Golem 🗿' },
    bombbeetle:      { tower:'cannon',    name:'Bomb Beetle 🪲' },
    golemsentinel:   { tower:'lightning', name:'Golem Sentinel ⚙️' },
    rottedrevenant:  { tower:'poison',    name:'Rotted Revenant 🧟' },
};
// Flying/underground enemies aren't locked to one single counter — about
// half the tower roster can hit each — so their warning lists every eligible
// tower instead of naming just one.
const ENEMY_TRAIT_INFO = {
    skyraider:     { trait:'flying',      name:'Sky Raider 🦅' },
    wyvern:        { trait:'flying',      name:'Wyvern 🐲' },
    stoneburrower: { trait:'underground', name:'Stone Burrower 🪨' },
    graveworm:     { trait:'underground', name:'Grave Worm 🐛' },
};

function showCardSelect(){
    if(skipNextCardReward){ skipNextCardReward=false; startWave(); return; }
    if(runNoCardRewards){ startWave(); return; } // Midas Run: no card rewards for the rest of this run
    let n=Math.max(1,betweenWaveCorrect);
    if(kingdomAcademyLevel>0 && Math.random()<0.05*kingdomAcademyLevel) n++;
    let options=pickCards(n);
    let justUnlockedId = null;
    if(pendingCardUnlocks.length){
        // Present the newly-unlocked card immediately, bypassing its normal
        // rarity weighting entirely, so the player gets to try it right away.
        justUnlockedId = pendingCardUnlocks.shift();
        let forcedCard = allCards.find(c=>c.id===justUnlockedId);
        if(forcedCard){
            let dupIdx = options.findIndex(o=>o.id===forcedCard.id);
            if(dupIdx>=0) options.splice(dupIdx,1);
            options[0] = forcedCard;
        }
    }
    let html=`<div class="modal-overlay"><div class="modal-box"><h2>${betweenWaveCorrect}/4 Correct! Choose one:</h2><div style="margin-top:16px">`;
    options.forEach((c,i)=>{
        let existing = (c.type==='tower') ? towers.find(t=>t.id===c.id) : null;
        let extra = existing ? `<div style="font-size:10px;color:#4caf50;margin-top:2px">⬆ Upgrade Lv${existing.level+1}</div>` : '';
        let newBadge = (justUnlockedId===c.id) ? `<div style="font-size:10px;color:#ffcc44;margin-top:2px">🆕 Newly Unlocked!</div>` : '';
        html+=`<button class="card-btn" data-idx="${i}"><div style="font-size:20px">${c.name}</div><div style="font-size:11px;margin-top:4px;color:#aaa">${c.desc}</div>${extra}${newBadge}</button>`;
    });
    html+=`</div>`;

    // Countdown preview: enemies with a single hard-counter tower, or with a
    // flying/underground trait that only half the roster can hit — so the
    // player knows what to have built before either kind arrives.
    let nextWave = wave+1;
    let upcoming = ENEMY_SPAWN_TABLE.filter(spec => spec.unlock>nextWave && spec.unlock-nextWave<=5 && (ENEMY_SINGLE_COUNTER[spec.type] || ENEMY_TRAIT_INFO[spec.type]))
        .sort((a,b)=>a.unlock-b.unlock);
    if(upcoming.length){
        html += `<div style="margin-top:14px;padding-top:10px;border-top:1px solid #443;font-size:11px;color:#aaa">`;
        upcoming.forEach(spec=>{
            let waves = spec.unlock-nextWave;
            if(ENEMY_SINGLE_COUNTER[spec.type]){
                let counter = ENEMY_SINGLE_COUNTER[spec.type];
                let towerCard = allCards.find(c=>c.id===counter.tower);
                let towerName = towerCard ? towerCard.name : counter.tower;
                let owned = towers.some(t=>t.id===counter.tower);
                let unlockNote = owned ? '' : ` — ${towerName} isn't unlocked yet!`;
                html += `<div>⚠️ ${counter.name} incoming in ${waves} wave${waves===1?'':'s'} — only ${towerName} damages it effectively${unlockNote}</div>`;
            } else {
                let info = ENEMY_TRAIT_INFO[spec.type];
                let capableIds = info.trait==='flying' ? FLYING_CAPABLE_TOWERS : UNDERGROUND_CAPABLE_TOWERS;
                let ownedCapable = towers.filter(t=>capableIds.includes(t.id));
                let capableNames = capableIds.filter(id=>id!=='player').map(id=>{ let c=allCards.find(x=>x.id===id); return c?c.name:id; }).join(', ');
                let readiness = ownedCapable.length ? '' : ` — none of your towers can hit it yet! Needs one of: ${capableNames}`;
                html += `<div>⚠️ ${info.name} incoming in ${waves} wave${waves===1?'':'s'} — ${info.trait==='flying'?'flies':'burrows underground'}, only half your towers can hit it${readiness}</div>`;
            }
        });
        html += `</div>`;
    }

    // Watch Towers: scout report on what's ahead, unlocked in stages.
    if(kingdomWatchTowerLevel>=1){
        let nextIsBoss = nextWave%5===0;
        html += `<div style="margin-top:14px;padding-top:10px;border-top:1px solid #445;font-size:11px;color:#8cf">🔭 Scout report:</div>`;
        if(nextIsBoss){
            html += `<div style="font-size:11px;color:#aaa">A boss looms over the next wave.</div>`;
        } else {
            let counts = {};
            ENEMY_SPAWN_TABLE.forEach(spec=>{ if(nextWave>=spec.unlock){ let c=Math.max(0,Math.floor(spec.count(nextWave))); if(c>0) counts[spec.type]=c; } });
            let parts = Object.entries(counts).map(([t,c])=>`${c}× ${t.replace(/_/g,' ')}`);
            html += `<div style="font-size:11px;color:#aaa">Next wave: ${parts.join(', ')||'quiet...'}</div>`;
        }
        if(kingdomWatchTowerLevel>=2){
            if(pendingMerchantRoll===null){
                let nextNextIsBoss = (nextWave+1)%5===0;
                pendingMerchantRoll = nextNextIsBoss ? false : (Math.random()<0.05);
            }
            html += `<div style="font-size:11px;color:#aaa">${pendingMerchantRoll ? '🧙 A merchant will be waiting after this wave.' : 'No merchant sighted for a while yet.'}</div>`;
        }
        if(kingdomWatchTowerLevel>=3 && !nextIsBoss){
            if(!weatherPreRolledForNextWave && weatherWavesLeft-1<=0){
                rollWeather();
                weatherPreRolledForNextWave = true;
            }
            let wdef = WEATHER_EFFECTS.find(w=>w.id===activeWeather);
            html += `<div style="font-size:11px;color:#aaa">${weatherPreRolledForNextWave ? `Weather shifting to ${wdef?wdef.name:'clear skies'}.` : 'Weather looks unchanged for now.'}</div>`;
        }
    }

    html+=`</div></div>`;
    modalRoot.innerHTML=html;
    modalRoot.querySelectorAll('.card-btn').forEach(btn=>{
        btn.onclick=()=>{
            let chosen = options[parseInt(btn.dataset.idx)];
            applyCard(chosen);
            // Twin Fate's promise: if it was active, whatever the player
            // just chose (as long as it wasn't Twin Fate itself) gets its
            // pick effect applied once more immediately.
            if(pendingDoubleNextCard && chosen.id!=='twinfate'){
                pendingDoubleNextCard = false;
                applyCard(chosen);
            }
            modalRoot.innerHTML='';
            startWave();
        };
    });
}

function showQuestion(){

    state='question';

        btn.onclick=()=>{
            let isCorrect=btn.dataset.correct==='true';
            if(isCorrect){
                btn.classList.add('correct');
                recordCorrectAnswer();
                let libraryProc = kingdomLibraryLevel>0 && Math.random()<0.05*kingdomLibraryLevel;

        startBtn.textContent = 'Loading...';

                : "⚠️ Couldn't load that question bank (try hosting this file on a local server).";
        }
