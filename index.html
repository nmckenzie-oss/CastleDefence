    let unlockHtml = '';
    if(pendingUnlockNotifications.length){
        unlockHtml = `<div style="background:rgba(255,204,68,0.12);border:1px solid #ffcc44;border-radius:8px;padding:10px;margin:12px 0">
            ${pendingUnlockNotifications.map(n=>`<div style="color:#ffcc44;font-size:13px">🎉 ${n}</div>`).join('')}
        </div>`;
    }
    let title = lastRunWasVoluntary ? '🏆 Run Complete!' : '💀 GAME OVER';
    let subtitle = lastRunWasVoluntary ? `You banked your progress after ${wave} waves!` : `You survived ${wave} waves!`;
    modalRoot.innerHTML=`<div class="modal-overlay"><div class="modal-box" style="text-align:center"><h2>${title}</h2><p style="margin:16px 0">${subtitle}</p><p style="color:#aaa">Towers built: ${towers.length}<br>Total kills: ${kills}</p><p style="color:#ffcc44;font-size:16px;margin:12px 0">👑 +${lastCrownsEarned} Crowns earned (Total: ${kingdomSave.crowns})</p>${unlockHtml}${!kingdomStorageOk?'<p style="color:#e74c3c;font-size:11px">⚠️ Save data is blocked in this browser — Crowns won\'t persist after this tab closes.</p>':''}<button class="choice-btn" style="text-align:center" id="kingdom-btn">🏰 Visit The Kingdom</button><button class="choice-btn" style="text-align:center;margin-top:8px" id="restart-btn">🔄 Play Again</button></div></div>`;
    document.getElementById('restart-btn').onclick=()=>{ location.reload(); };
    document.getElementById('kingdom-btn').onclick=()=> showKingdom(()=>showGameOver());
}

canvas.addEventListener('click', (e)=>{
    if(state!=='playing'||ammo<=0) return;
    ammo--;
    let rect=canvas.getBoundingClientRect();
    let mx=(e.clientX-rect.left)/scale, my=(e.clientY-rect.top)/scale;
    let ox=(W/scale - GAME_W)/2, oy=(H/scale - GAME_H)/2;
    let tx=mx-ox, ty=my-oy;
    let sx=70, sy=160;
    let angle=Math.atan2(ty-sy,tx-sx);
    let spd=5;
    if(hasElite){
        // Base is a 3-way spread (level 1). Each repeat pick adds 2 more
        // arrows to the spread, capped at 9, spacing them across a fixed cone.
        let lvl = getCardLevel('elite') || 1;
        let shots = Math.min(9, 1+2*lvl);
        let coneHalfWidth = 0.35;
        for(let s=0;s<shots;s++){
            let t = shots===1 ? 0 : (s/(shots-1)-0.5)*2; // -1..1
            let a=angle+t*coneHalfWidth;
            projectiles.push({x:sx,y:sy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,dmg:10*globalDmgMult,type:'arrow',life:80,sourceTowerId:'player'});
        }
    } else {
        projectiles.push({x:sx,y:sy,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,dmg:10*globalDmgMult,type:'arrow',life:80,sourceTowerId:'player'});
    }
    updateHUD();
});

document.addEventListener('keydown',(e)=>{ if(e.key==='q'||e.key==='Q') showQuestion(); });
document.getElementById('ammo-btn').onclick=()=>showQuestion();
document.getElementById('target-btn').onclick=()=>{
    towerTargetMode = (towerTargetMode==='nearest') ? 'strongest' : 'nearest';
    document.getElementById('target-btn').textContent = towerTargetMode==='nearest' ? '🎯 Targeting: Nearest' : '🎯 Targeting: Strongest';
};
document.getElementById('cashout-btn').onclick=()=> showCashOutConfirm();

// Offered once gold is sitting at its cap — further gold income is being
// clamped and wasted, so the player can choose to bank their run's Crowns
// right now instead of continuing to grind with no economic upside.
function showCashOutConfirm(){
    if(state!=='playing') return;
    state='cashout-confirm';
    let projected = Math.floor(wave*3 + kills*0.2 + gold*0.05);
    modalRoot.innerHTML = `<div class="modal-overlay"><div class="modal-box" style="text-align:center">
        <h2>💰 Gold Maxed Out</h2>
        <p style="margin:14px 0;color:#ccc">Your gold income is capped at ${maxGold} — any more you earn is being wasted. You can end this run right now and bank what you've got as Crowns instead.</p>
        <p style="color:#ffcc44;font-size:15px;margin:10px 0">👑 ~${projected} Crowns if you cash out now</p>
        <p style="font-size:11px;color:#888;margin-bottom:12px">Waiting costs nothing but potential — surviving further waves and getting more kills would still add to this total. This is purely your call.</p>
        <button class="choice-btn" style="text-align:center;background:rgba(255,204,68,0.15);border-color:#ffcc44" id="cashout-confirm-btn">🏰 Cash Out & Bank Crowns</button>
        <button class="choice-btn" style="text-align:center;margin-top:8px" id="cashout-cancel-btn">⚔️ Keep Playing</button>
    </div></div>`;
    document.getElementById('cashout-confirm-btn').onclick = ()=>{
        modalRoot.innerHTML='';
        showGameOver(true);
    };
    document.getElementById('cashout-cancel-btn').onclick = ()=>{
        modalRoot.innerHTML='';
        state='playing';
        updateHUD();
    };
}

function updateHUD(){
    document.getElementById('hud-wave').textContent='⭐ Wave: '+wave;
    document.getElementById('hud-hp').textContent='❤️ HP: '+Math.floor(castleHP)+'/'+maxHP;
    document.getElementById('hud-ammo').textContent='🏹 Ammo: '+ammo+'/'+maxAmmo;
    document.getElementById('hud-gold').textContent='🪙 Gold: '+gold;
    document.getElementById('hud-bank').textContent='📚 '+currentBankName;
    let w = WEATHER_EFFECTS.find(x=>x.id===activeWeather);
    document.getElementById('hud-weather').textContent = w ? w.name : '';
    // Gold income is wasted once you're capped — surface the option to bank
    // what you've got into Crowns now instead of continuing to overflow it.
    let cashoutBtn = document.getElementById('cashout-btn');
    if(cashoutBtn) cashoutBtn.style.display = (gold>=maxGold && state==='playing') ? 'inline-block' : 'none';
}

function drawBackground(ox, oy, s){
    let grd = ctx.createLinearGradient(0,0,0,(oy+180)*s);
    grd.addColorStop(0,'#0b0b2a');
    grd.addColorStop(0.4,'#1a1a3e');
    grd.addColorStop(0.7,'#2a1a3a');
    grd.addColorStop(1,'#3a2244');
    ctx.fillStyle=grd;
    ctx.fillRect(0,0,W,(oy+220)*s);

    stars.forEach(st=>{
        let twinkle = Math.sin(animFrame*0.03+st.b*10)*0.5+0.5;
        ctx.fillStyle=`rgba(255,255,${200+Math.floor(st.b*55)},${0.3+twinkle*0.7})`;
        let sz = st.b>0.8?2:1;
        ctx.fillRect((ox+st.x)*s,(oy+st.y)*s, sz*s, sz*s);
    });

    ctx.fillStyle='#eeeedd';
    ctx.beginPath();
    ctx.arc((ox+400)*s,(oy+40)*s,12*s,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#ccccbb';
    ctx.beginPath();
    ctx.arc((ox+403)*s,(oy+38)*s,10*s,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle='#221133';
    ctx.beginPath();
    ctx.moveTo(0,(oy+200)*s);
    for(let i=0;i<=16;i++) ctx.lineTo((ox+i*32)*s,(oy+mts1[i])*s);
    ctx.lineTo(W,(oy+200)*s);
    ctx.fill();

    ctx.fillStyle='#1a2a22';
    ctx.beginPath();
    ctx.moveTo(0,(oy+220)*s);
    for(let i=0;i<=16;i++) ctx.lineTo((ox+i*32)*s,(oy+mts2[i])*s);
    ctx.lineTo(W,(oy+220)*s);
    ctx.fill();

    ctx.fillStyle='#2a2a18';
    ctx.fillRect(0,(oy+220)*s,W,H);
    ctx.fillStyle='#333322';
    ctx.fillRect(0,(oy+230)*s,W,H);
    ctx.fillStyle='#445522';
    for(let i=0;i<GAME_W;i+=8){
        let h=2+Math.sin(i*0.3)*1;
        ctx.fillRect((ox+i)*s,(oy+218)*s, 3*s, h*s);
    }
    // Path
    ctx.fillStyle='#3a3520';
    ctx.fillRect((ox+120)*s,(oy+240)*s, (GAME_W-120)*s, 16*s);
    ctx.fillStyle='#4a4530';
    for(let i=120;i<GAME_W;i+=20){
        ctx.fillRect((ox+i)*s,(oy+246)*s, 8*s, 4*s);
    }
    drawWeatherOverlay(ox, oy, s);
}

// Tints the whole scene and layers weather-specific effects on top, so each
// active weather is visually obvious at a glance, not just a stat modifier.
function drawWeatherOverlay(ox, oy, s){
    if(!activeWeather) return;
    if(activeWeather==='rain'){
        ctx.fillStyle='rgba(40,60,90,0.28)';
        ctx.fillRect(0,0,W,H);
        ctx.strokeStyle='rgba(180,200,230,0.55)';
        ctx.lineWidth=Math.max(1,s*0.5);
        for(let i=0;i<40;i++){
            let seed=i*137.5;
            let x=seed%GAME_W;
            let y=((animFrame*4+seed*3)%(GAME_H+40))-20;
            ctx.beginPath();
            ctx.moveTo((ox+x)*s,(oy+y)*s);
            ctx.lineTo((ox+x-6)*s,(oy+y+14)*s);
            ctx.stroke();
        }
    } else if(activeWeather==='fog'){
        ctx.fillStyle='rgba(200,200,210,0.32)';
        ctx.fillRect(0,0,W,H);
        for(let i=0;i<6;i++){
            let seed=i*81.3;
            let x=((animFrame*0.3+seed*40)%(GAME_W+120))-60;
            let y=140+(i%3)*30;
            ctx.fillStyle='rgba(255,255,255,0.18)';
            ctx.beginPath();
            ctx.ellipse((ox+x)*s,(oy+y)*s, 50*s, 18*s, 0,0,Math.PI*2);
            ctx.fill();
        }
    } else if(activeWeather==='night'){
        ctx.fillStyle='rgba(5,5,25,0.45)';
        ctx.fillRect(0,0,W,H);
    } else if(activeWeather==='eclipse'){
        ctx.fillStyle='rgba(90,15,15,0.32)';
        ctx.fillRect(0,0,W,H);
        ctx.fillStyle='#110000';
        ctx.beginPath(); ctx.arc((ox+400)*s,(oy+40)*s,13*s,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='rgba(255,120,60,0.8)';
        ctx.lineWidth=Math.max(1,s*1.5);
        ctx.beginPath(); ctx.arc((ox+400)*s,(oy+40)*s,15*s,0,Math.PI*2); ctx.stroke();
    } else if(activeWeather==='blizzard'){
        ctx.fillStyle='rgba(210,225,245,0.28)';
        ctx.fillRect(0,0,W,H);
        ctx.fillStyle='rgba(255,255,255,0.85)';
        for(let i=0;i<50;i++){
            let seed=i*97.7;
            let x=((seed*3+Math.sin(animFrame*0.02+i)*10)%GAME_W+GAME_W)%GAME_W;
            let y=((animFrame*2+seed*2)%(GAME_H+20))-10;
            ctx.fillRect((ox+x)*s,(oy+y)*s, 2*s, 2*s);
        }
    }
}

function drawCastle(ox, oy, s){
    let bx=ox+40, by=oy+140;

    // Main castle keep — layered stone shading for depth
    ctx.fillStyle='#2a2a3a';
    ctx.fillRect((bx-1)*s, (by-1)*s, 52*s, 82*s); // outline shadow
    ctx.fillStyle=castleColor;
    ctx.fillRect(bx*s, by*s, 50*s, 80*s);
    ctx.fillStyle='rgba(255,255,255,0.06)';
    ctx.fillRect(bx*s, by*s, 8*s, 80*s); // left-face highlight
    ctx.fillStyle='rgba(0,0,0,0.1)';
    ctx.fillRect((bx+42)*s, by*s, 8*s, 80*s); // right-face shadow
    // Bricks (mortar shadow + highlight per row for texture)
    for(let r=0;r<8;r++){
        let xOff=(r%2)*6;
        ctx.fillStyle='#3a3a52';
        ctx.fillRect((bx+2)*s,(by+2+r*10)*s, 46*s, 1*s); // mortar shadow line
        ctx.fillStyle='#5a5a78';
        for(let c=0;c<4;c++){
            ctx.fillRect((bx+2+c*12+xOff)*s,(by+1+r*10)*s, 10*s, 1*s); // brick highlight
        }
        ctx.fillStyle='#4a4a66';
        for(let c=0;c<4;c++){
            ctx.fillRect((bx+2+c*12+xOff)*s,(by+3+r*10)*s, 10*s, 1*s);
        }
    }
    // Corner turrets
    [bx-3, bx+43].forEach(cx=>{
        ctx.fillStyle='#3a3a52';
        ctx.fillRect((cx-1)*s,(by-14)*s, 12*s, 96*s);
        ctx.fillStyle=castleColor;
        ctx.fillRect(cx*s,(by-13)*s, 10*s, 94*s);
        ctx.fillStyle='rgba(255,255,255,0.08)';
        ctx.fillRect(cx*s,(by-13)*s, 3*s, 94*s);
        for(let i=0;i<3;i++){
            ctx.fillStyle=castleColor;
            ctx.fillRect((cx+i*3.3)*s,(by-20)*s, 2.5*s, 8*s); // turret crenellations
        }
    });
    // Battlements — individually shaded merlons
    for(let i=0;i<5;i++){
        ctx.fillStyle='#3a3a52';
        ctx.fillRect((bx+i*10-0.5)*s,(by-9)*s, 8*s, 11*s);
        ctx.fillStyle=castleColor;
        ctx.fillRect((bx+i*10)*s,(by-8)*s, 7*s, 10*s);
        ctx.fillStyle='rgba(255,255,255,0.1)';
        ctx.fillRect((bx+i*10)*s,(by-8)*s, 2*s, 10*s);
    }
    // Roof — shingled with ridge highlight
    ctx.fillStyle='#5a1522';
    ctx.beginPath();
    ctx.moveTo((bx+9)*s,(by-7)*s);
    ctx.lineTo((bx+25)*s,(by-29)*s);
    ctx.lineTo((bx+41)*s,(by-7)*s);
    ctx.fill();
    ctx.fillStyle='#883344';
    ctx.beginPath();
    ctx.moveTo((bx+10)*s,(by-8)*s);
    ctx.lineTo((bx+25)*s,(by-28)*s);
    ctx.lineTo((bx+40)*s,(by-8)*s);
    ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.beginPath();
    ctx.moveTo((bx+25)*s,(by-28)*s);
    ctx.lineTo((bx+22)*s,(by-8)*s);
    ctx.lineTo((bx+25)*s,(by-8)*s);
    ctx.fill(); // ridge highlight
    ctx.fillStyle='#772233';
    for(let r=0;r<4;r++) ctx.fillRect((bx+13+r)*s,(by-20+r*4)*s, (24-r*2)*s, 1*s); // shingle lines

    // Flag
    let flagW=Math.sin(animFrame*0.06)*2;
    ctx.fillStyle='#5a0a1a';
    ctx.fillRect((bx+23.5)*s,(by-42)*s, 2*s, 16*s); // pole shadow
    ctx.fillStyle='#aa1133';
    ctx.fillRect((bx+24)*s,(by-42)*s, 2*s, 16*s);
    ctx.fillStyle='#ee2244';
    ctx.fillRect((bx+26)*s,(by-42+flagW)*s, 12*s, 8*s);
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.fillRect((bx+26)*s,(by-42+flagW)*s, 12*s, 2*s);
    ctx.fillStyle='#ffcc00';
    ctx.fillRect((bx+29)*s,(by-40+flagW)*s, 6*s, 4*s);

    // Windows — arched with sill and glow
    let wGlow=Math.sin(animFrame*0.04)*0.3+0.7;
    [15,30].forEach(wx=>{
        ctx.fillStyle='#1a1a2a';
        ctx.fillRect((bx+wx-1)*s,(by+29)*s, 7*s, 9*s);
        ctx.fillStyle=`rgba(255,220,80,${wGlow})`;
        ctx.fillRect((bx+wx)*s,(by+30)*s, 5*s, 7*s);
        ctx.beginPath(); ctx.arc((bx+wx+2.5)*s,(by+30)*s, 2.5*s, Math.PI, 0); ctx.fill(); // arch top
        ctx.fillStyle='#3a2a10';
        ctx.fillRect((bx+wx+2)*s,(by+30)*s, 1*s, 7*s); // mullion
    });

    // Gate — arched with wood-plank detail
    ctx.fillStyle='#1a0d00';
    ctx.fillRect((bx+16)*s,(by+54)*s, 18*s, 26*s);
    ctx.fillStyle='#221100';
    ctx.fillRect((bx+17)*s,(by+56)*s, 16*s, 24*s);
    ctx.beginPath(); ctx.arc((bx+25)*s,(by+56)*s, 8*s, Math.PI, 0); ctx.fill(); // arch top
    ctx.fillStyle='#3a2005';
    for(let i=0;i<4;i++) ctx.fillRect((bx+18+i*3.5)*s,(by+58)*s, 0.8*s, 20*s); // plank lines
    ctx.fillStyle='#442200';
    ctx.fillRect((bx+19)*s,(by+57)*s, 5*s, 23*s);
    ctx.fillRect((bx+26)*s,(by+57)*s, 5*s, 23*s);
    ctx.fillStyle='#221100';
    for(let i=0;i<3;i++){ ctx.beginPath(); ctx.arc((bx+21.5)*s,(by+60+i*7)*s,0.8*s,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc((bx+28.5)*s,(by+60+i*7)*s,0.8*s,0,Math.PI*2); ctx.fill(); } // studs

    // Torches
    if(animFrame%6<4){
        ctx.fillStyle='#ff8800';
        ctx.fillRect((bx+5)*s,(by+20)*s, 3*s, 3*s);
        ctx.fillStyle='#ffcc00';
        ctx.fillRect((bx+5)*s,(by+18)*s, 3*s, 2*s);
        ctx.fillStyle='#ff8800';
        ctx.fillRect((bx+42)*s,(by+20)*s, 3*s, 3*s);
        ctx.fillStyle='#ffcc00';
        ctx.fillRect((bx+42)*s,(by+18)*s, 3*s, 2*s);
    }

    // Draw town buildings around castle base based on townBuildings count
    let townSpacing = 8;
    for(let i=0;i<townBuildings;i++){
        let layer = Math.floor(i / 8);
        let posInLayer = i % 8;
        let tx = bx - 20 - layer * 12 + (posInLayer % 2) * 6;
        let ty = by + 50 + layer * 8;
        // Small building blocks
        ctx.fillStyle = '#6a5a4a';
        ctx.fillRect(tx*s, ty*s, 8*s, 6*s);
        ctx.fillStyle = '#5a4a3a';
        ctx.fillRect(tx*s, (ty-2)*s, 8*s, 2*s);
        ctx.fillStyle = '#8a7a6a';
        ctx.fillRect((tx+1)*s, (ty+1)*s, 2*s, 2*s);
        ctx.fillRect((tx+5)*s, (ty+1)*s, 2*s, 2*s);
    }

    // Draw towers at base as city buildings
    towers.forEach((t,i)=>{
        let tx=ox+t.x, ty=oy+t.y;
        drawTower(t, tx, ty, s);
    });

    // Moat
    if(hasMoat){
        ctx.fillStyle='#1a4488';
        ctx.fillRect((bx+50)*s,(oy+218)*s, 20*s, 50*s);
        ctx.fillStyle='#2266aa';
        for(let r=0;r<3;r++){
            let rOff=Math.sin(animFrame*0.05+r)*3;
            ctx.fillRect((bx+53+rOff)*s,(oy+224+r*12)*s, 12*s, 2*s);
        }
    }

    // Dragon coils around the keep's spire
    if(hasDragon){
        let t = animFrame*0.05;
        ctx.strokeStyle='#aa2255';
        ctx.lineWidth=4*s;
        ctx.lineCap='round';
        ctx.beginPath();
        for(let i=0;i<=20;i++){
            let py = by-5 - i*3;
            let coilX = bx+25 + Math.sin(i*0.6+t)*13;
            if(i===0) ctx.moveTo(coilX*s, py*s); else ctx.lineTo(coilX*s, py*s);
        }
        ctx.stroke();
        ctx.strokeStyle='#661133';
        ctx.lineWidth=1.5*s;
        ctx.beginPath();
        for(let i=0;i<=20;i+=2){
            let py = by-5 - i*3;
            let coilX = bx+25 + Math.sin(i*0.6+t)*13;
            ctx.moveTo(coilX*s, py*s); ctx.lineTo((coilX+3)*s, (py-2)*s); // spine ridges
        }
        ctx.stroke();
        // Head near the top of the coil
        let headY = by-5-20*3;
        let headX = bx+25 + Math.sin(20*0.6+t)*13;
        ctx.fillStyle='#aa2255';
        ctx.fillRect((headX-4)*s, (headY-4)*s, 9*s, 7*s);
        ctx.fillStyle='#ffcc00';
        ctx.fillRect((headX-1)*s, (headY-2)*s, 2*s, 2*s); // eye
        let wingF=Math.sin(animFrame*0.08)*2;
        ctx.fillStyle='#882244';
        ctx.fillRect((headX-10)*s,(headY+4+wingF)*s, 7*s, 3*s);
        ctx.fillRect((headX+5)*s,(headY+4-wingF)*s, 7*s, 3*s);
    }

    if(hasKing){
        ctx.fillStyle='#ffcc00';
        ctx.fillRect((bx+22)*s,(by+15)*s, 6*s, 3*s);
        ctx.fillStyle='#ddaa00';
        ctx.fillRect((bx+23)*s,(by+18)*s, 4*s, 6*s);
        ctx.fillStyle='#ff3366';
        ctx.fillRect((bx+24)*s,(by+15.5)*s, 2*s, 2*s); // ruby
    }

    // Warhorn mounted on the battlements
    if(cards.some(c=>c.id==='warhorn')){
        ctx.fillStyle='#8a6a3a';
        ctx.beginPath();
        ctx.moveTo((bx-2)*s,(by-4)*s);
        ctx.quadraticCurveTo((bx-14)*s,(by-2)*s,(bx-13)*s,(by+6)*s);
        ctx.lineTo((bx-9)*s,(by+5)*s);
        ctx.quadraticCurveTo((bx-10)*s,(by-1)*s,(bx-1)*s,(by-1)*s);
        ctx.fill();
        ctx.fillStyle='#c8a860';
        ctx.beginPath(); ctx.arc((bx-13)*s,(by+5)*s,2.5*s,0,Math.PI*2); ctx.fill(); // bell
    }

    // Priestly halo over the keep
    if(priestHeal){
        let glow=0.5+Math.sin(animFrame*0.05)*0.3;
        ctx.strokeStyle=`rgba(255,230,150,${glow})`;
        ctx.lineWidth=2*s;
        ctx.beginPath();
        ctx.ellipse((bx+25)*s,(by-30)*s, 9*s, 3*s, 0, 0, Math.PI*2);
        ctx.stroke();
        ctx.fillStyle=`rgba(255,240,190,${glow*0.6})`;
        ctx.beginPath();
        ctx.arc((bx+25)*s,(by-30)*s, 6*s, 0, Math.PI*2);
        ctx.fill();
    }

    // Meteor orbiting the keep
    if(hasMeteor){
        let orbit = animFrame*0.03;
        let mx = bx+25 + Math.cos(orbit)*30;
        let my = by-10 + Math.sin(orbit)*10;
        ctx.fillStyle='#553322';
        ctx.beginPath(); ctx.arc(mx*s, my*s, 4*s, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle='#ff8800';
        ctx.beginPath(); ctx.arc((mx-4)*s, (my-1)*s, 1.5*s, 0, Math.PI*2); ctx.fill(); // trailing ember
    }
}

// A small bony melee minion raised by the Necromancer tower — bobs in place
// while walking, fades out as its remaining lifespan runs low.
function drawSkeletonAlly(sk, ox, oy, s){
    let x=(ox+sk.x)*s, y=(oy+sk.y)*s;
    let bob = Math.sin((animFrame+sk.bobSeed*10)*0.2)*1.5;
    ctx.globalAlpha = sk.life<60 ? Math.max(0.15, sk.life/60) : 1;
    ctx.fillStyle='#e8e4d8';
    ctx.fillRect(x-2, y-6+bob, 4, 6); // torso
    ctx.fillStyle='#d8d4c4';
    ctx.beginPath(); ctx.arc(x, y-8+bob, 2.4, 0, Math.PI*2); ctx.fill(); // skull
    ctx.fillStyle='#222';
    ctx.fillRect(x-1, y-8.5+bob, 0.8, 0.8); // eye socket
    ctx.strokeStyle='#c8c4b4';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x-3,y-3+bob); ctx.lineTo(x-4,y+1+bob); ctx.stroke(); // arm
    ctx.beginPath(); ctx.moveTo(x+3,y-3+bob); ctx.lineTo(x+4,y+1+bob); ctx.stroke(); // arm
    ctx.globalAlpha = 1;
}

function drawTower(t, tx, ty, s){
    let lvlIndicator = t.level > 1;
    // Stretch the tower 20% taller, anchored at its base so it grows upward
    // in place rather than sinking into the ground.
    let groundY = (ty+24)*s;
    ctx.save();
    ctx.translate(0, groundY);
    ctx.scale(1, 1.2);
    ctx.translate(0, -groundY);
    if(t.id==='archer'){
        ctx.fillStyle='#4a3a20';
        ctx.fillRect((tx-1)*s,(ty-5)*s, 22*s, 30*s); // outline
        ctx.fillStyle='#6b5530';
        ctx.fillRect(tx*s,(ty-4)*s, 20*s, 28*s);
        ctx.fillStyle='rgba(255,255,255,0.1)';
        ctx.fillRect(tx*s,(ty-4)*s, 4*s, 28*s); // stone highlight
        ctx.fillStyle='rgba(0,0,0,0.12)';
        for(let r=0;r<5;r++) ctx.fillRect(tx*s,(ty-4+r*6)*s, 20*s, 1*s); // mortar lines
        ctx.fillStyle='#8b7040';
        ctx.fillRect((tx+2)*s,ty*s, 16*s, 3*s);
        ctx.fillRect((tx+2)*s,(ty+12)*s, 16*s, 3*s);
        ctx.fillStyle='#222';
        ctx.fillRect((tx+8)*s,(ty+4)*s, 3*s, 8*s);
        ctx.fillStyle='#4a3a20';
        ctx.fillRect((tx+3)*s,(ty-10)*s, 14*s, 8*s);
        ctx.fillRect((tx+6)*s,(ty-14)*s, 8*s, 6*s);
        ctx.fillStyle='#6b5530';
        ctx.fillRect((tx+6)*s,(ty-14)*s, 8*s, 1.5*s); // roof ridge
        ctx.fillStyle='#4a3a20';
        for(let i=0;i<3;i++) ctx.fillRect((tx+3+i*5)*s,(ty-13)*s, 3*s, 3*s); // battlement crenellations
    } else if(t.id==='ballista'){
        ctx.fillStyle='#445566';
        ctx.fillRect((tx-1)*s,(ty-1)*s, 24*s, 24*s); // outline
        ctx.fillStyle='#667788';
        ctx.fillRect(tx*s,ty*s, 22*s, 22*s);
        ctx.fillStyle='rgba(255,255,255,0.12)';
        ctx.fillRect(tx*s,ty*s, 22*s, 4*s); // top edge highlight
        ctx.fillStyle='#556677';
        for(let i=0;i<3;i++) ctx.fillRect((tx+2+i*7)*s,(ty+3)*s, 4*s, 4*s); // stone block seams
        ctx.fillStyle='#556677';
        ctx.fillRect((tx+3)*s,(ty-6)*s, 16*s, 8*s);
        ctx.fillStyle='#445566';
        ctx.fillRect((tx+3)*s,(ty-6)*s, 16*s, 2*s); // platform lip shadow
        ctx.fillStyle='#aa8844';
        ctx.fillRect((tx-3)*s,(ty-2)*s, 8*s, 3*s);
        ctx.fillRect((tx+17)*s,(ty-2)*s, 8*s, 3*s);
        ctx.fillStyle='#ccaa66';
        ctx.fillRect((tx-3)*s,(ty-2)*s, 8*s, 1*s);
        ctx.fillRect((tx+17)*s,(ty-2)*s, 8*s, 1*s);
        ctx.fillStyle='#333';
        ctx.fillRect((tx+8)*s,(ty-4)*s, 6*s, 5*s);
        ctx.fillStyle='#777';
        ctx.fillRect((tx+10)*s,(ty-4)*s, 1.5*s, 5*s); // firing groove
    } else if(t.id==='cannon'){
        ctx.fillStyle='#3a3a2a';
        ctx.fillRect((tx-1)*s,(ty+5)*s, 26*s, 20*s); // outline
        ctx.fillStyle='#555544';
        ctx.fillRect(tx*s,(ty+6)*s, 24*s, 18*s);
        ctx.fillStyle='rgba(255,255,255,0.08)';
        ctx.fillRect(tx*s,(ty+6)*s, 24*s, 4*s); // top highlight
        ctx.fillStyle='#3f3f30';
        ctx.beginPath(); ctx.arc((tx+4)*s,(ty+10)*s,1.2*s,0,Math.PI*2); ctx.fill(); // rivets
        ctx.beginPath(); ctx.arc((tx+20)*s,(ty+10)*s,1.2*s,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc((tx+4)*s,(ty+20)*s,1.2*s,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc((tx+20)*s,(ty+20)*s,1.2*s,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#333322';
        ctx.fillRect((tx+3)*s,(ty-2)*s, 18*s, 12*s);
        ctx.fillStyle='#454534';
        ctx.fillRect((tx+3)*s,(ty-2)*s, 18*s, 3*s); // barrel-housing highlight
        ctx.fillStyle='#222211';
        ctx.fillRect((tx+18)*s,(ty+1)*s, 12*s, 6*s);
        ctx.fillStyle='#3a3a2a';
        ctx.fillRect((tx+18)*s,(ty+1)*s, 12*s, 1.5*s); // barrel highlight
        ctx.fillStyle='#111';
        ctx.fillRect((tx+27)*s,(ty+2)*s, 3*s, 4*s); // muzzle
        ctx.fillStyle='#443322';
        ctx.fillRect((tx+2)*s,(ty+22)*s, 6*s, 6*s);
        ctx.fillRect((tx+16)*s,(ty+22)*s, 6*s, 6*s);
    } else if(t.id==='firemage'){
        ctx.fillStyle='#8a2c00';
        ctx.fillRect((tx-1)*s,(ty-1)*s, 20*s, 26*s); // outline
        ctx.fillStyle='#cc4400';
        ctx.fillRect(tx*s,ty*s, 18*s, 24*s);
        ctx.fillStyle='rgba(255,255,255,0.1)';
        ctx.fillRect(tx*s,ty*s, 4*s, 24*s); // highlight
        ctx.fillStyle='rgba(0,0,0,0.12)';
        for(let r=0;r<4;r++) ctx.fillRect(tx*s,(ty+r*6)*s, 18*s, 1*s); // brick lines
        ctx.fillStyle='#a83a00';
        ctx.beginPath(); ctx.moveTo(tx*s,(ty+24)*s); ctx.lineTo((tx+9)*s,(ty+30)*s); ctx.lineTo((tx+18)*s,(ty+24)*s); ctx.fill(); // base flare
        ctx.fillStyle='#ff6600';
        ctx.fillRect((tx+4)*s,(ty-10)*s, 10*s, 12*s);
        let flicker=Math.sin(animFrame*0.15)*2;
        ctx.fillStyle='#ffaa00';
        ctx.fillRect((tx+6)*s,(ty-16+flicker)*s, 6*s, 6*s);
        ctx.fillStyle='#ff4400';
        ctx.fillRect((tx+7)*s,(ty-20+flicker)*s, 4*s, 5*s);
        drawWizardFigure(tx, ty-30, s, '#8a1a1a', '#ffaa00', animFrame); // fire wizard atop the spire
    } else if(t.id==='icemage'){
        ctx.fillStyle='#155a80';
        ctx.fillRect((tx-1)*s,(ty-1)*s, 20*s, 26*s); // outline
        ctx.fillStyle='#2288bb';
        ctx.fillRect(tx*s,ty*s, 18*s, 24*s);
        ctx.fillStyle='rgba(255,255,255,0.12)';
        ctx.fillRect(tx*s,ty*s, 4*s, 24*s); // highlight
        ctx.fillStyle='rgba(255,255,255,0.08)';
        for(let r=0;r<4;r++) ctx.fillRect(tx*s,(ty+r*6)*s, 18*s, 1*s); // ice-brick lines
        ctx.fillStyle='#0f4a68';
        ctx.beginPath(); ctx.moveTo(tx*s,(ty+24)*s); ctx.lineTo((tx+9)*s,(ty+30)*s); ctx.lineTo((tx+18)*s,(ty+24)*s); ctx.fill(); // base flare
        ctx.fillStyle='#44ccee';
        ctx.fillRect((tx+3)*s,(ty-12)*s, 12*s, 16*s);
        ctx.fillRect((tx+6)*s,(ty-18)*s, 6*s, 8*s);
        if(animFrame%10<5){
            ctx.fillStyle='#ffffff';
            ctx.fillRect((tx+7)*s,(ty-8)*s, 3*s, 3*s);
        }
        drawWizardFigure(tx, ty-30, s, '#0f3a55', '#aaeeff', animFrame); // ice witch atop the spire
    } else if(t.id==='axeman'){
        ctx.fillStyle='#4a2f1a';
        ctx.fillRect((tx-1)*s,(ty-1)*s, 22*s, 24*s); // outline
        ctx.fillStyle='#7a5533';
        ctx.fillRect(tx*s,ty*s, 20*s, 22*s);
        ctx.fillStyle='rgba(255,255,255,0.1)';
        ctx.fillRect(tx*s,ty*s, 4*s, 22*s); // highlight
        ctx.fillStyle='rgba(0,0,0,0.15)';
        for(let i=0;i<3;i++) ctx.fillRect((tx+2+i*6)*s,ty*s, 1*s, 22*s); // log-wall texture
        ctx.fillStyle='#5a3a22';
        ctx.fillRect((tx+2)*s,(ty-6)*s, 16*s, 8*s);
        ctx.fillStyle='#3a2515';
        ctx.fillRect((tx+2)*s,(ty-6)*s, 16*s, 2*s); // roof shadow
        ctx.fillStyle='#aaaaaa';
        ctx.fillRect((tx+3)*s,(ty+5)*s, 4*s, 10*s);
        ctx.fillRect((tx+13)*s,(ty+5)*s, 4*s, 10*s);
        ctx.fillStyle='#dddddd';
        ctx.fillRect((tx+3)*s,(ty+5)*s, 1.5*s, 10*s); // blade glint
        ctx.fillRect((tx+13)*s,(ty+5)*s, 1.5*s, 10*s);
    } else if(t.id==='lightning'){
        ctx.fillStyle='#554400';
        ctx.fillRect((tx-1)*s,(ty-1)*s, 20*s, 26*s); // outline
        ctx.fillStyle='#887711';
        ctx.fillRect(tx*s,ty*s, 18*s, 24*s);
        ctx.fillStyle='rgba(255,255,255,0.12)';
        ctx.fillRect(tx*s,ty*s, 4*s, 24*s);
        ctx.fillStyle='#333';
        ctx.fillRect((tx+4)*s,(ty-10)*s, 10*s, 12*s); // coil housing
        ctx.strokeStyle='#ffee44';
        ctx.lineWidth=Math.max(1,s*0.7);
        ctx.beginPath();
        ctx.moveTo((tx+9)*s,(ty-16)*s); ctx.lineTo((tx+6)*s,(ty-9)*s); ctx.lineTo((tx+11)*s,(ty-8)*s); ctx.lineTo((tx+7)*s,(ty-1)*s);
        ctx.stroke(); // rod
        let spark=animFrame%12<3;
        if(spark){
            ctx.fillStyle='#ffffcc';
            ctx.beginPath(); ctx.arc((tx+9)*s,(ty-16)*s, 2.5*s, 0, Math.PI*2); ctx.fill();
        }
    } else if(t.id==='poison'){
        ctx.fillStyle='#2f3a1a';
        ctx.fillRect((tx-1)*s,(ty-1)*s, 20*s, 26*s); // outline
        ctx.fillStyle='#4f6a2a';
        ctx.fillRect(tx*s,ty*s, 18*s, 24*s);
        ctx.fillStyle='rgba(255,255,255,0.1)';
        ctx.fillRect(tx*s,ty*s, 4*s, 24*s);
        ctx.fillStyle='#3a4a1a';
        ctx.fillRect((tx+3)*s,(ty-8)*s, 12*s, 10*s); // cauldron stand
        ctx.fillStyle='#556b2f';
        ctx.beginPath(); ctx.ellipse((tx+9)*s,(ty-9)*s, 7*s, 4*s, 0, 0, Math.PI*2); ctx.fill(); // cauldron rim
        let bubble=Math.sin(animFrame*0.15)*2;
        ctx.fillStyle='#88cc44';
        ctx.globalAlpha=0.6;
        ctx.beginPath(); ctx.arc((tx+9)*s,(ty-13+bubble)*s, 2.5*s, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha=1;
    } else if(t.id==='necromancer'){
        ctx.fillStyle='#151520';
        ctx.fillRect((tx-1)*s,(ty-1)*s, 20*s, 26*s); // outline
        ctx.fillStyle='#2a2a3a';
        ctx.fillRect(tx*s,ty*s, 18*s, 24*s);
        ctx.fillStyle='rgba(255,255,255,0.06)';
        ctx.fillRect(tx*s,ty*s, 4*s, 24*s); // highlight
        ctx.fillStyle='#1a1a28';
        for(let r=0;r<4;r++) ctx.fillRect(tx*s,(ty+r*6)*s, 18*s, 1*s); // stone lines
        ctx.fillStyle='#0a0a12';
        ctx.fillRect((tx+3)*s,(ty-9)*s, 12*s, 11*s); // spire
        ctx.fillStyle='#e8e4d8';
        ctx.beginPath(); ctx.arc((tx+9)*s,(ty-11)*s, 3*s, 0, Math.PI*2); ctx.fill(); // skull finial
        ctx.fillStyle='#111';
        ctx.fillRect((tx+7.5)*s,(ty-11.5)*s, 1*s, 1*s);
        ctx.fillRect((tx+9.5)*s,(ty-11.5)*s, 1*s, 1*s);
        let necroGlow=0.4+Math.sin(animFrame*0.08)*0.3;
        ctx.fillStyle=`rgba(120,255,140,${necroGlow})`;
        ctx.beginPath(); ctx.arc((tx+9)*s,(ty+8)*s, 2.5*s, 0, Math.PI*2); ctx.fill(); // spectral orb
    } else {
        ctx.fillStyle=t.color||'#888';
        ctx.fillRect(tx*s,(ty-6)*s, 18*s, 28*s);
    }
    ctx.restore();
    // Level indicator
    if(lvlIndicator){
        ctx.fillStyle='#ffcc00';
        for(let i=0;i<Math.min(t.level-1,5);i++){
            ctx.fillRect((tx+2+i*4)*s,(ty-18)*s, 3*s, 3*s);
        }
    }
}

// A small robed figure standing atop a mage tower's spire, used to visually
// distinguish Fire Mage (red robe) from Ice Mage (blue robe) towers.
function drawWizardFigure(tx, ty, s, robeColor, glowColor, animFrame){
    let sway = Math.sin(animFrame*0.06)*1.2;
    ctx.fillStyle=robeColor;
    ctx.fillRect((tx+6+sway)*s, ty*s, 6*s, 9*s); // robe body
    ctx.beginPath();
    ctx.moveTo((tx+6+sway)*s, ty*s);
    ctx.lineTo((tx+3+sway)*s, (ty+9)*s);
    ctx.lineTo((tx+15+sway)*s, (ty+9)*s);
    ctx.lineTo((tx+12+sway)*s, ty*s);
    ctx.fill(); // robe skirt flare
    ctx.fillStyle='#e8c9a0';
    ctx.fillRect((tx+7+sway)*s, (ty-4)*s, 4*s, 4*s); // head
    ctx.fillStyle=robeColor;
    ctx.beginPath();
    ctx.moveTo((tx+6+sway)*s,(ty-4)*s);
    ctx.lineTo((tx+9+sway)*s,(ty-10)*s);
    ctx.lineTo((tx+12+sway)*s,(ty-4)*s);
    ctx.fill(); // pointed hat
    ctx.fillStyle=glowColor;
    ctx.globalAlpha=0.6+Math.sin(animFrame*0.1)*0.3;
    ctx.beginPath();
    ctx.arc((tx+16+sway)*s, (ty+2)*s, 2.5*s, 0, Math.PI*2);
    ctx.fill(); // orb held out
    ctx.globalAlpha=1;
    ctx.fillStyle='#5a4a30';
    ctx.fillRect((tx+15+sway)*s, (ty+2)*s, 1*s, 8*s); // staff
}

function drawEnemy(e, ox, oy, s){
    let ex=(ox+e.x)*s, ey=(oy+e.y)*s;
    if(e.dead){
        ctx.globalAlpha=1-e.deathTimer/20;
        ctx.fillStyle='#ff4444';
        for(let i=0;i<5;i++){
            ctx.fillRect(ex+Math.sin(e.deathTimer*0.5+i*1.3)*8, ey-i*4, 3*s, 3*s);
        }
        ctx.globalAlpha=1;
        return;
    }
    let bob=Math.sin(animFrame*0.12+e.x*0.1)*1.5;
    let legOff=Math.sin(animFrame*0.18+e.x*0.1)*3;
    let frozen=e.frozen>0;

    if(e.type==='goblin'){
        ctx.fillStyle=frozen?'#6bb0e0':'#3a6a2a';
        ctx.fillRect(ex+1, ey+bob+1, 10*s, 12*s); // shadow/outline layer
        ctx.fillStyle=frozen?'#88ccff':'#4a8a3a';
        ctx.fillRect(ex+2, (ey+bob+2), 8*s, 10*s);
        ctx.fillStyle='rgba(255,255,255,0.15)';
        ctx.fillRect(ex+3, ey+bob+2, 3*s, 6*s); // highlight
        ctx.fillStyle=frozen?'#88ccff':'#5aaa4a';
        ctx.fillRect(ex+3*s,(ey+bob-5)*s, 6*s, 7*s);
        ctx.fillStyle=frozen?'#88ccff':'#3a7a2a';
        ctx.fillRect(ex, ey+bob-6, 3*s, 4*s);
        ctx.fillRect(ex+9, ey+bob-6, 3*s, 4*s);
        ctx.fillStyle='#ff0';
        ctx.fillRect(ex+4, ey+bob-3, 2*s, 2*s);
        ctx.fillRect(ex+7, ey+bob-3, 2*s, 2*s);
        ctx.fillStyle='#fff';
        ctx.fillRect(ex+4, ey+bob+1, 4*s, 1*s); // teeth
        ctx.fillStyle='#cccccc';
        ctx.fillRect(ex-1, ey+bob+5, 2*s, 6*s);
        ctx.fillStyle='#eeeeee';
        ctx.fillRect(ex-1, ey+bob+4, 2*s, 1*s); // blade glint
        ctx.fillStyle=frozen?'#88ccff':'#4a8a3a';
        ctx.fillRect(ex+2, ey+bob+11, 2.5*s, 2*s); // leg (torso-toned, short)
        ctx.fillRect(ex+7.5, ey+bob+11, 2.5*s, 2*s);
        ctx.fillStyle=frozen?'#88ccff':'#3a2a18';
        ctx.fillRect(ex+2, ey+bob+13, 2.5*s, 2*s); // boots — distinct color so legs read separately from the torso
        ctx.fillRect(ex+7.5, ey+bob+13, 2.5*s, 2*s);
    } else if(e.type==='skeleton'){
        ctx.fillStyle=frozen?'#6bb0e0':'#bbbaa8';
        ctx.fillRect(ex+2, ey+bob+1, 9*s, 13*s); // outline layer
        ctx.fillStyle=frozen?'#88ccff':'#dddccc';
        ctx.fillRect(ex+3, ey+bob+2, 7*s, 11*s);
        ctx.fillStyle=frozen?'#88ccff':'#eeeedd';
        ctx.fillRect(ex+4, ey+bob-5, 5*s, 6*s);
        ctx.fillStyle='rgba(255,255,255,0.25)';
        ctx.fillRect(ex+4, ey+bob-5, 2*s, 5*s); // skull highlight
        ctx.fillStyle='#220000';
        ctx.fillRect(ex+5, ey+bob-3, 1*s, 2*s);
        ctx.fillRect(ex+7, ey+bob-3, 1*s, 2*s);
        ctx.fillStyle='#443300';
        ctx.fillRect(ex+5, ey+bob, 3*s, 1*s); // jaw line
        ctx.fillStyle='#bbbbaa';
        for(let r=0;r<3;r++) ctx.fillRect(ex+4, ey+bob+3+r*3, 5*s, 1*s);
        ctx.fillStyle='#999988';
        for(let r=0;r<3;r++) ctx.fillRect(ex+4, ey+bob+4+r*3, 5*s, 0.6*s); // rib shading
        ctx.fillStyle='#666688';
        ctx.fillRect(ex-2, ey+bob+3, 4*s, 8*s);
        ctx.fillStyle='rgba(180,180,255,0.4)';
        ctx.fillRect(ex-2, ey+bob+3, 1.5*s, 8*s); // shield edge glow
        ctx.fillStyle='#aaaacc';
        ctx.fillRect(ex+11, ey+bob, 2*s, 12*s);
        ctx.fillStyle='#dddeee';
        ctx.fillRect(ex+11, ey+bob-1, 4*s, 2*s); // spear tip
        ctx.fillStyle=frozen?'#88ccff':'#ccccbb';
        ctx.fillRect(ex+4, ey+bob+13, 2*s, 5*s);
        ctx.fillRect(ex+7, ey+bob+13, 2*s, 5*s);
    } else if(e.type==='knight'){
        ctx.fillStyle=frozen?'#6bb0e0':'#3f4d77';
        ctx.fillRect(ex+1, ey+bob, 12*s, 15*s); // armor outline
        ctx.fillStyle=frozen?'#88ccff':'#6677aa';
        ctx.fillRect(ex+2, ey+bob+1, 10*s, 13*s);
        ctx.fillStyle='rgba(255,255,255,0.18)';
        ctx.fillRect(ex+3, ey+bob+2, 3*s, 10*s); // chestplate highlight
        ctx.fillStyle=frozen?'#88ccff':'#5566aa';
        ctx.fillRect(ex+3, ey+bob-6, 8*s, 8*s);
        ctx.fillStyle='#333355';
        ctx.fillRect(ex+3, ey+bob-6, 8*s, 2*s); // helmet brim shading
        ctx.fillStyle='#111';
        ctx.fillRect(ex+5, ey+bob-3, 4*s, 2*s);
        ctx.fillStyle='#cc2244';
        ctx.fillRect(ex+6, ey+bob-10, 3*s, 5*s);
        ctx.fillStyle='#ee5577';
        ctx.fillRect(ex+7, ey+bob-10, 1*s, 5*s); // plume highlight
        ctx.fillStyle=frozen?'#88ccff':'#778bbb';
        ctx.fillRect(ex, ey+bob+1, 3*s, 5*s);
        ctx.fillRect(ex+11, ey+bob+1, 3*s, 5*s);
        ctx.fillStyle='#ccccdd';
        ctx.fillRect(ex+13, ey+bob-4, 2*s, 18*s);
        ctx.fillStyle='#eeeeff';
        ctx.fillRect(ex+13, ey+bob-4, 0.8*s, 18*s); // sword edge glint
        ctx.fillStyle='#aa8833';
        ctx.fillRect(ex+12, ey+bob+2, 4*s, 2*s);
        ctx.fillStyle=frozen?'#88ccff':'#556699';
        ctx.fillRect(ex+3, ey+bob+14, 4*s, 5*s);
        ctx.fillRect(ex+8, ey+bob+14, 4*s, 5*s);
    } else if(e.type==='wolf'){
        ctx.fillStyle=frozen?'#6bb0e0':'#3d3025';
        ctx.fillRect(ex+1, ey+bob+3, 16*s, 9*s); // body outline
        ctx.fillStyle=frozen?'#88ccff':'#554433';
        ctx.fillRect(ex+2, ey+bob+4, 14*s, 7*s);
        ctx.fillStyle='rgba(255,255,255,0.12)';
        ctx.fillRect(ex+2, ey+bob+4, 14*s, 2*s); // back highlight
        ctx.fillStyle=frozen?'#88ccff':'#443322';
        for(let i=0;i<4;i++) ctx.fillRect(ex+3+i*3, ey+bob+5, 1*s, 5*s); // fur texture
        ctx.fillStyle=frozen?'#88ccff':'#665544';
        ctx.fillRect(ex-2, ey+bob+2, 6*s, 5*s);
        ctx.fillStyle=frozen?'#88ccff':'#443322';
        ctx.fillRect(ex-2, ey+bob-1, 2*s, 3*s);
        ctx.fillRect(ex+2, ey+bob-1, 2*s, 3*s);
        ctx.fillStyle='#ff3300';
        ctx.fillRect(ex-1, ey+bob+3, 2*s, 2*s);
        ctx.fillStyle='rgba(255,150,80,0.6)';
        ctx.fillRect(ex-1, ey+bob+3, 1*s, 1*s); // eye glint
        ctx.fillStyle=frozen?'#88ccff':'#443322';
        ctx.fillRect(ex+2, ey+bob+11, 2*s, 4*s);
        ctx.fillRect(ex+6, ey+bob+11, 2*s, 4*s);
        ctx.fillRect(ex+10, ey+bob+11, 2*s, 4*s);
        ctx.fillRect(ex+14, ey+bob+11, 2*s, 4*s);
        ctx.fillRect(ex+16, ey+bob+2, 4*s, 2*s);

        ctx.fillRect(ex+2-wingSpread, fy-1, wingSpread*s, 5*s); // left wing
        ctx.fillRect(ex+11, fy-1, wingSpread*s, 5*s); // right wing
        ctx.fillStyle='#ffaa00';
        ctx.fillRect(ex+9, fy+2, 1.6*s, 1.6*s); // eye
        ctx.fillStyle='#5a1515';
        ctx.fillRect(ex+11, fy+4, 3*s, 1.3*s); // tail spike
    } else if(e.type==='stoneburrower'){
        // Underground enemies render mostly hidden beneath a dirt mound, only
        // a rocky hump visible above the surface, selling the "burrowing" read.
        ctx.fillStyle='#4a3a28';
        ctx.beginPath(); ctx.ellipse(ex+5, ey+bob+11, 8*s, 3.5*s, 0, 0, Math.PI*2); ctx.fill(); // dirt mound
        ctx.fillStyle=frozen?'#6bb0e0':'#6a6a5a';
        ctx.beginPath(); ctx.ellipse(ex+5, ey+bob+6, 7*s, 6*s, 0, 0, Math.PI); ctx.fill(); // rocky hump poking out
        ctx.fillStyle=frozen?'#88ccff':'#8a8a7a';
        ctx.beginPath(); ctx.ellipse(ex+5, ey+bob+5, 5*s, 4*s, 0, 0, Math.PI); ctx.fill();
        ctx.fillStyle='#ffcc44';
        ctx.fillRect(ex+3, ey+bob+3, 1.3*s, 1.3*s); // eye
        ctx.fillRect(ex+7, ey+bob+3, 1.3*s, 1.3*s);
        ctx.fillStyle='#3a3a2a';
        for(let i=0;i<3;i++) ctx.fillRect(ex+1+i*3.5, ey+bob+10, 1.3*s, 1.3*s); // dirt clods kicked up
    } else if(e.type==='graveworm'){
        ctx.fillStyle='#2a1a2a';
        ctx.beginPath(); ctx.ellipse(ex+5, ey+bob+12, 7*s, 3*s, 0, 0, Math.PI*2); ctx.fill(); // dirt mound
        let wriggle = Math.sin(animFrame*0.2+e.x*0.2)*2;
        ctx.fillStyle=frozen?'#6bb0e0':'#5a2a5a';
        ctx.fillRect(ex+2+wriggle, ey+bob+2, 6*s, 8*s); // worm segment outline
        ctx.fillStyle=frozen?'#88ccff':'#7a3a7a';
        ctx.fillRect(ex+3+wriggle, ey+bob+3, 4*s, 6*s);
        ctx.fillStyle='#aa5aaa';
        for(let i=0;i<2;i++) ctx.fillRect(ex+3+wriggle, ey+bob+4+i*3, 4*s, 1*s); // segment rings
        ctx.fillStyle='#ccff44';
        ctx.globalAlpha=0.5+Math.sin(animFrame*0.2)*0.3;
        ctx.fillRect(ex+3+wriggle, ey+bob+3, 1.3*s, 1.3*s); // toxic glow eye
        ctx.globalAlpha=1;
    } else if(e.type==='boss'){
        drawBossSprite(e, ex, ey, s, bob, frozen);
    }

    if(e.poisonTicks>0){
        ctx.fillStyle='rgba(120,200,60,0.6)';
        for(let i=0;i<3;i++){
            let bx=ex+3+i*4, by=ey+bob-2-((animFrame*0.7+i*7)%14);
            ctx.beginPath(); ctx.arc(bx, by, 1.5*s, 0, Math.PI*2); ctx.fill();
        }
    }
    if(e.burnTicks>0){
        ctx.fillStyle=`rgba(255,${120+Math.floor(Math.sin(animFrame*0.4)*60)},20,0.7)`;
        for(let i=0;i<2;i++){
            let bx=ex+4+i*6, by=ey+bob-4-((animFrame*0.9+i*5)%8);
            ctx.beginPath(); ctx.moveTo(bx,by+3); ctx.lineTo(bx-1.5*s,by); ctx.lineTo(bx,by-3*s); ctx.lineTo(bx+1.5*s,by); ctx.fill();
        }
    }

    // HP bar — shown once an enemy has taken any damage
    if(e.hp<e.maxHp){
        let barW = e.type==='boss' ? 26 : 16;
        let barY = e.type==='boss' ? -34 : -14;
        let barX = ex - (e.type==='boss'?5:0);
        let barPx = ey + barY;
        let pct = Math.max(0, e.hp/e.maxHp);
        let fillColor = e.type==='boss' ? '#ff4444' : (pct>0.6 ? '#44cc44' : pct>0.3 ? '#ddcc22' : '#ee4433');
        ctx.fillStyle='#111';
        ctx.fillRect(barX, barPx, barW*s, 3*s);
        ctx.fillStyle=fillColor;
        ctx.fillRect(barX, barPx, barW*s*pct, 3*s);
        ctx.strokeStyle='rgba(0,0,0,0.6)';
        ctx.lineWidth=1;
        ctx.strokeRect(barX, barPx, barW*s, 3*s);
        if(e.type==='boss' && e.bossDef){
            ctx.font=`${8*s}px monospace`;
            ctx.fillStyle='#ffcc44';
            ctx.textAlign='center';
            ctx.fillText(e.bossDef.name, ex+8-5, barPx-3);
            ctx.textAlign='left';
        }
    }
}

// Detailed boss sprite renderer. Each boss shares a common armored-warrior base
// (torso/legs/head with shading) so silhouettes read clearly at small scale, then
// layers on a unique accessory (wings, crown, staff, cape, etc.) per boss type.
function drawBossSprite(e, ex, ey, s, bob, frozen){
    let def = e.bossDef || bossDefs[0];
    let body = frozen ? '#88ccff' : def.body;
    let robe = frozen ? '#6bb0e0' : def.robe;
    let trim = def.trim;
    let eye = def.eye;
    let pulse = Math.sin(animFrame*0.1)*0.5+0.5;

    // Shield aura
    if(e.shieldActive){
        ctx.globalAlpha = 0.35+pulse*0.2;
        ctx.fillStyle = '#aaeeff';
        ctx.beginPath();
        ctx.arc(ex+11, (ey+bob+4), 22*s, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
    // Enrage aura
    if(e.enraged){
        ctx.globalAlpha = 0.3+pulse*0.3;
        ctx.fillStyle = '#ff3300';
        ctx.beginPath();
        ctx.arc(ex+11, (ey+bob+4), 18*s, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }

    // Legs
    ctx.fillStyle = robe;
    ctx.fillRect((ex+2), (ey+bob+22), 6*s, 9*s);
    ctx.fillRect((ex+12), (ey+bob+22), 6*s, 9*s);
    ctx.fillStyle = '#111';
    ctx.fillRect((ex+2), (ey+bob+29), 6*s, 3*s);
    ctx.fillRect((ex+12), (ey+bob+29), 6*s, 3*s);

    // Torso (layered shading for extra detail/resolution)
    ctx.fillStyle = robe;
    ctx.fillRect(ex, (ey+bob-2), 20*s, 26*s);
    ctx.fillStyle = body;
    ctx.fillRect((ex+2), (ey+bob), 16*s, 20*s);
    ctx.fillStyle = trim;
    ctx.fillRect((ex+2), (ey+bob+9), 16*s, 3*s); // belt
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect((ex+3), (ey+bob+1), 5*s, 16*s); // highlight

    // Arms
    ctx.fillStyle = robe;
    ctx.fillRect((ex-4), (ey+bob+2), 5*s, 16*s);
    ctx.fillRect((ex+19), (ey+bob+2), 5*s, 16*s);
    ctx.fillStyle = trim;
    ctx.fillRect((ex-4), (ey+bob+15), 5*s, 4*s);
    ctx.fillRect((ex+19), (ey+bob+15), 5*s, 4*s);

    // Head
    ctx.fillStyle = body;
    ctx.fillRect((ex+4), (ey+bob-14), 12*s, 13*s);
    ctx.fillStyle = robe;
    ctx.fillRect((ex+3), (ey+bob-16), 14*s, 5*s); // brow/helmet band
    // Glowing eyes
    ctx.fillStyle = eye;
    ctx.globalAlpha = 0.6+pulse*0.4;
    ctx.fillRect((ex+6), (ey+bob-9), 3*s, 3*s);
    ctx.fillRect((ex+11), (ey+bob-9), 3*s, 3*s);
    ctx.globalAlpha = 1;

    // Contrast outline around the whole silhouette — makes dark-palette bosses
    // (e.g. Demon Overlord, Necromancer) pop against the dark background.
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = Math.max(1, s*0.6);
    ctx.strokeRect((ex-4), (ey+bob-16), 28*s, 47*s);

    drawBossAccessory(def, e, ex, ey, s, bob, pulse);
}

function drawBossAccessory(def, e, ex, ey, s, bob, pulse){
    const acc = def.accessory;
    if(acc==='wings'){
        let flap = Math.sin(animFrame*0.1)*4;
        ctx.fillStyle = def.robe;
        ctx.beginPath();
        ctx.moveTo((ex+1),(ey+bob+2));
        ctx.lineTo((ex-16),(ey+bob-8-flap));
        ctx.lineTo((ex-10),(ey+bob+10));
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo((ex+19),(ey+bob+2));
        ctx.lineTo((ex+36),(ey+bob-8+flap));
        ctx.lineTo((ex+30),(ey+bob+10));
        ctx.fill();
    } else if(acc==='staff_skull'){
        ctx.fillStyle='#444455';
        ctx.fillRect((ex+21),(ey+bob-20), 2*s, 40*s);
        ctx.fillStyle=def.eye;
        ctx.globalAlpha=0.5+pulse*0.5;
        ctx.fillRect((ex+18),(ey+bob-26), 8*s, 7*s);
        ctx.globalAlpha=1;
        ctx.fillStyle='#000';
        ctx.fillRect((ex+20),(ey+bob-24), 1.5*s, 2*s);
        ctx.fillRect((ex+23),(ey+bob-24), 1.5*s, 2*s);
    } else if(acc==='staff_orb'){
        ctx.fillStyle='#334477';
        ctx.fillRect((ex+21),(ey+bob-18), 2*s, 38*s);
        ctx.fillStyle=def.eye;
        ctx.globalAlpha=0.5+pulse*0.5;
        ctx.beginPath(); ctx.arc((ex+22),(ey+bob-22), 5*s, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha=1;
    } else if(acc==='shoulderspikes'){
        ctx.fillStyle='#777';
        for(let i=0;i<3;i++){
            ctx.beginPath();
            ctx.moveTo((ex-2+i*3),(ey+bob-2));
            ctx.lineTo((ex-1+i*3),(ey+bob-9));
            ctx.lineTo((ex+i*3),(ey+bob-2));
            ctx.fill();
        }
        for(let i=0;i<3;i++){
            ctx.beginPath();
            ctx.moveTo((ex+16+i*3),(ey+bob-2));
            ctx.lineTo((ex+17+i*3),(ey+bob-9));
            ctx.lineTo((ex+18+i*3),(ey+bob-2));
            ctx.fill();
        }
    } else if(acc==='hood'){
        ctx.fillStyle=def.robe;
        ctx.fillRect((ex+2),(ey+bob-17), 16*s, 6*s);
        ctx.beginPath();
        ctx.moveTo((ex+4),(ey+bob-17));
        ctx.lineTo((ex+10),(ey+bob-25));
        ctx.lineTo((ex+16),(ey+bob-17));
        ctx.fill();
        if(animFrame%40<20){
            ctx.globalAlpha=0.28;
            ctx.fillStyle='#000';
            ctx.fillRect((ex-4),(ey+bob+2), 28*s, 20*s);
            ctx.globalAlpha=1;
        }
    } else if(acc==='moss'){
        ctx.fillStyle='#5a7a3a';
        ctx.fillRect((ex+1),(ey+bob+2), 5*s, 4*s);
        ctx.fillRect((ex+13),(ey+bob+10), 6*s, 4*s);
        ctx.fillStyle='#333';
        ctx.fillRect((ex+4),(ey+bob-4), 1.5*s, 8*s);
        ctx.fillRect((ex+12),(ey+bob+4), 1.5*s, 10*s);
    } else if(acc==='cape'){
        let sway = Math.sin(animFrame*0.08)*3;
        ctx.fillStyle=def.trim;
        ctx.beginPath();
        ctx.moveTo((ex+1),(ey+bob-1));
        ctx.lineTo((ex-8+sway),(ey+bob+28));
        ctx.lineTo((ex+19),(ey+bob+24));
        ctx.lineTo((ex+19),(ey+bob-1));
        ctx.fill();
        ctx.fillStyle=def.eye;
        ctx.fillRect((ex+7),(ey+bob-5), 6*s, 2*s); // fangs hint
    } else if(acc==='crown'){
        ctx.fillStyle='#ffcc00';
        ctx.fillRect((ex+3),(ey+bob-21), 14*s, 5*s);
        for(let i=0;i<4;i++){
            ctx.beginPath();
            ctx.moveTo((ex+3+i*3.5),(ey+bob-21));
            ctx.lineTo((ex+4.75+i*3.5),(ey+bob-27));
            ctx.lineTo((ex+6.5+i*3.5),(ey+bob-21));
            ctx.fill();
        }
    } else if(acc==='icecrown'){
        ctx.fillStyle='#cceeff';
        for(let i=0;i<3;i++){
            ctx.beginPath();
            ctx.moveTo((ex+4+i*5),(ey+bob-16));
            ctx.lineTo((ex+6.5+i*5),(ey+bob-26));
            ctx.lineTo((ex+9+i*5),(ey+bob-16));
            ctx.fill();
        }
        if(animFrame%20<10){
            ctx.fillStyle='rgba(200,240,255,0.5)';
            ctx.fillRect((ex-2),(ey+bob-30), 24*s, 40*s);
        }
    } else if(acc==='horns'){
        ctx.fillStyle='#221111';
        ctx.beginPath();
        ctx.moveTo((ex+3),(ey+bob-14));
        ctx.lineTo((ex-2),(ey+bob-24));
        ctx.lineTo((ex+6),(ey+bob-13));
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo((ex+17),(ey+bob-14));
        ctx.lineTo((ex+22),(ey+bob-24));
        ctx.lineTo((ex+14),(ey+bob-13));
        ctx.fill();
        if(e.enraged){
            ctx.globalAlpha=0.4+pulse*0.4;
            ctx.fillStyle='#ff4400';
            ctx.fillRect((ex-6),(ey+bob-6), 32*s, 30*s);
            ctx.globalAlpha=1;
        }
    }
}

function drawProjectile(p, ox, oy, s){
    let px2=(ox+p.x)*s, py2=(oy+p.y)*s;
    if(p.crit){
        ctx.fillStyle='#ffd700';
        ctx.globalAlpha=0.6;
        ctx.fillRect(px2-2*s,py2-2*s, 11*s, 6*s);
        ctx.globalAlpha=1;
    }
    if(p.type==='arrow'){
        ctx.fillStyle='#ffdd44';
        ctx.fillRect(px2,py2, 7*s, 2*s);
        ctx.fillStyle='#aa8833';
        ctx.fillRect(px2+7*s,py2, 2*s, 2*s);
    } else if(p.type==='fire'){
        ctx.fillStyle='#ff4400';
        ctx.fillRect(px2,py2, 6*s, 6*s);
        ctx.fillStyle='#ffaa00';
        ctx.fillRect(px2+1*s,py2+1*s, 4*s, 4*s);
    } else if(p.type==='ice'){
        ctx.fillStyle='#44ccff';
        ctx.fillRect(px2,py2, 5*s, 5*s);
        ctx.fillStyle='#aaeeff';
        ctx.fillRect(px2+1*s,py2+1*s, 3*s, 3*s);
    } else if(p.type==='cannon'){
        ctx.fillStyle='#222';
        ctx.fillRect(px2,py2, 7*s, 7*s);
        ctx.fillStyle='#444';
        ctx.fillRect(px2+1*s,py2+1*s, 5*s, 5*s);
    } else if(p.type==='bolt'){
        ctx.fillStyle='#334455';
        ctx.fillRect(px2,py2, 10*s, 2*s);
        ctx.fillStyle='#ccddee';
        ctx.fillRect(px2+8*s,py2-1*s, 3*s, 4*s);
        if(p.arc){ // shadow beneath, grows fainter with height
            ctx.globalAlpha = Math.max(0.1, 0.4-(p.groundHeight||0)*0.01);
            ctx.fillStyle='#000';
            ctx.beginPath(); ctx.ellipse(px2+5*s, (oy+p.ty)*s, 5*s, 2*s, 0, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha=1;
        }
    } else if(p.type==='axe'){
        ctx.save();
        ctx.translate(px2+3*s, py2+3*s);
        ctx.rotate((animFrame*0.6)%(Math.PI*2));
        ctx.fillStyle='#888888';
        ctx.fillRect(-1*s,-6*s, 2*s, 12*s);
        ctx.fillStyle='#bbbbbb';
        ctx.beginPath();
        ctx.moveTo(1*s,-5*s); ctx.lineTo(6*s,-2*s); ctx.lineTo(1*s,1*s); ctx.fill();
        ctx.restore();
        if(p.arc){
            ctx.globalAlpha = Math.max(0.1, 0.4-(p.groundHeight||0)*0.01);
            ctx.fillStyle='#000';
            ctx.beginPath(); ctx.ellipse(px2+3*s, (oy+p.ty)*s, 4*s, 2*s, 0, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha=1;
        }
    } else if(p.type==='poison'){
        ctx.save();
        ctx.translate(px2+3*s, py2+3*s);
        ctx.rotate((animFrame*0.3)%(Math.PI*2));
        ctx.fillStyle='#77aa22';
        ctx.fillRect(-2*s,-3*s, 4*s, 6*s);
        ctx.fillStyle='#aaccaa';
        ctx.fillRect(-1*s,-5*s, 2*s, 2*s); // cork
        ctx.restore();
        ctx.globalAlpha=0.5;
        ctx.fillStyle='#99cc44';
        ctx.beginPath(); ctx.arc(px2+3*s,py2+3*s, 5*s, 0, Math.PI*2); ctx.fill(); // toxic haze trail
        ctx.globalAlpha=1;
        if(p.arc){
            ctx.globalAlpha = Math.max(0.1, 0.4-(p.groundHeight||0)*0.01);
            ctx.fillStyle='#334422';
            ctx.beginPath(); ctx.ellipse(px2+3*s, (oy+p.ty)*s, 5*s, 2*s, 0, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha=1;
        }
    } else {
        ctx.fillStyle='#fff';
        ctx.fillRect(px2,py2, 4*s, 4*s);
    }
}

function towerUpdate(t){
    if(towersFrozen>0) return;
    t.cooldown--;
    if(t.cooldown>0) return;
    let rate = Math.floor(t.rate / globalSpeedMult * kingdomRateMult * (1-(t.apprenticeRateBonus||0)));
    if(activeWeather==='blizzard') rate = Math.floor(rate*1.5); // fires 50% slower

    if(t.id==='necromancer'){
        // Doesn't fire projectiles — instead periodically resurrects
        // skeletonCount skeletons that melee whatever's nearby.
        t.cooldown = rate;
        let count = (t.skeletonCount || 1) + kingdomHealersSkeletonBonus;
        for(let i=0;i<count;i++){
            skeletonAllies.push({
                x: t.x+10+i*4, y: t.y+16,
                life: 480, // ~8s at 60fps before the skeleton crumbles
                hitTimer: 0,
                dmg: t.dmg*globalDmgMult*waveDmgMult*(t.level>1?1+t.level*0.3:1),
                rangePercent: t.rangePercent,
                sourceTowerId: 'necromancer',
                bobSeed: Math.random()*10,
            });
        }
        particles.push({x:t.x+10,y:t.y+10,vx:0,vy:-1,life:20,color:'#88ff88',size:5});
        return;
    }

    // Percentage-based range: tower covers from 0% to rangePercent of the stage width (left side)
    let rangePercent = (t.rangePercent !== undefined) ? t.rangePercent : 50;
    if(activeWeather==='fog') rangePercent *= 0.5;
    let maxEnemyX = (rangePercent * GAME_W / 100);
    let target=null, best=Infinity;
    enemies.forEach(e=>{
        if(e.dead) return;
        // Check if enemy is in tower's range zone (percentage-based only)
        if(e.x > maxEnemyX) return;
        if(!canTowerHit(t.id, e)) return; // flying/underground enemies only hit by their designated towers
        if(towerTargetMode==='strongest'){
            let score = -e.maxHp; // most-max-HP wins; lower score = better
            if(score<best){ best=score; target=e; }
        } else {
            let d=Math.hypot(e.x-t.x, e.y-t.y);
            if(d<best){ best=d; target=e; }
        }
    });
    if(!target) return;
    t.cooldown=rate;
    // Overclock: towers fire faster overall, but each shot has a chance to
    // jam and do nothing — the cooldown still resets as normal, so the
    // tower just wasted this attack window.
    if(overclockJamChance>0 && Math.random()<overclockJamChance){
        particles.push({x:t.x+10,y:t.y-4,vx:0,vy:-0.5,life:14,color:'#888888',size:3});
        return;
    }
    let dist=Math.hypot(target.x-t.x, target.y-t.y);
    let angle=Math.atan2(target.y-t.y, target.x-t.x);
    let spd=3;
    let ptype='arrow';
    if(t.id==='firemage') ptype='fire';
    if(t.id==='icemage') ptype='ice';
    if(t.id==='cannon') ptype='cannon';
    if(t.id==='ballista') ptype='bolt';
    if(t.id==='axeman') ptype='axe';
    if(t.id==='poison') ptype='poison';
    let dmg=t.dmg*globalDmgMult*waveDmgMult*(t.level>1?1+t.level*0.3:1);
    if(t.id==='archer' || t.id==='axeman') dmg += kingdomDmgBonusArcherAxe;
    if(t.apprenticeDmgBonus) dmg += t.apprenticeDmgBonus;
    if(activeWeather==='rain' && t.id==='firemage') dmg *= 0.5; // fire towers weaker in the rain
    // Commander: every tower has a chance to crit for double damage.
    let isCrit = commanderCritChance>0 && Math.random()<commanderCritChance;
    if(isCrit) dmg *= 2;
    let sx=t.x+10, sy=t.y;

    if(t.id==='lightning'){
        // Instant chain strike: no projectile travel time at all — the bolt
        // jumps between nearby enemies immediately, each jump for less damage.
        let hitList=[];
        let current=target;
        let usedIds=new Set();
        for(let i=0;i<t.chainCount && current;i++){
            let jumpDmg = dmg*Math.pow(t.chainFalloff,i);
            applyDamageToEnemy(current, jumpDmg, t.id);
            if(!current.dead) current.frozen = Math.max(current.frozen||0, Math.round(20*kingdomEffectDurationMult));
            hitList.push({x:current.x,y:current.y});
            usedIds.add(current);
            let next=null, nd=t.chainRadius;
            enemies.forEach(e2=>{
                if(e2.dead || usedIds.has(e2) || !canTowerHit(t.id, e2)) return;
                let d=Math.hypot(e2.x-current.x, e2.y-current.y);
                if(d<nd){ nd=d; next=e2; }
            });
            current=next;
        }
        lightningBolts.push({points:[{x:sx,y:sy},...hitList], life:10});
        return;
    }

    let effSplash = t.splash;
    if(t.id==='poison' && t.apprenticeSplashBonus) effSplash = t.splash*(1+t.apprenticeSplashBonus);
    let freezeBonusMult = (t.id==='icemage' && t.apprenticeFreezeBonus) ? (1+t.apprenticeFreezeBonus) : 1;

    if(t.id==='ballista' || t.id==='axeman' || t.id==='poison'){
        // Parabolic arc: naturally limits pierce range, since the shot can only
        // hit enemies near ground level (close to launch or close to landing),
        // not everything along a straight line the way a flat shot would.
        let totalLife = Math.max(20, Math.ceil(dist/spd));
        let arcHeight = Math.min(50, 15+dist*0.15);
        if(t.id==='ballista') arcHeight *= 1.25; // Ballista's bolt arcs noticeably higher than Axeman/Poison's shared trajectory
        projectiles.push({sx,sy,tx:target.x,ty:target.y,x:sx,y:sy,life:totalLife,totalLife,arcHeight,arc:true,dmg,type:ptype,freeze:t.freeze,freezeBonusMult,splash:effSplash,pierce:t.pierce,sourceTowerId:t.id,hitSet:new Set(),poison:t.poison,crit:isCrit});
    } else {
        let life = Math.ceil(dist/spd)+15; // enough frames to actually reach the target, regardless of range
        projectiles.push({x:sx,y:sy,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,dmg,type:ptype,life,freeze:t.freeze,freezeBonusMult,splash:effSplash,pierce:t.pierce,sourceTowerId:t.id,hitSet:new Set(),poison:t.poison,crit:isCrit});
    }
}

let lastTime=0;
function gameLoop(time){
    let dt=Math.min(time-lastTime, 32);
    lastTime=time;
    animFrame++;

    ctx.fillStyle='#0a0a0a';
    ctx.fillRect(0,0,W,H);

    let s=scale;
    let ox=(W/s - GAME_W)/2, oy=(H/s - GAME_H)/2;

    drawBackground(ox, oy, s);
    drawCastle(ox, oy, s);

    if(state==='playing'){
        spawnTimer++;
        let spawnParams = getSpawnParams();
        if(spawnQueue.length>0 && spawnTimer>spawnParams.interval){
            spawnTimer=0;
            let aliveCount = enemies.filter(e=>!e.dead).length;
            if(aliveCount < MAX_ALIVE_ENEMIES){
                let toSpawn = Math.min(spawnParams.batchSize, spawnQueue.length, MAX_ALIVE_ENEMIES-aliveCount);
                for(let i=0;i<toSpawn;i++) enemies.push(spawnEnemy(spawnQueue.shift()));
            }
        }

        enemies.forEach(e=>{
            if(e.dead){ e.deathTimer++; return; }
            let spd=e.speed;
            if(activeAffix==='vanguard') spd*=1.6;
            if(e.frozen>0){ spd*=0.3; e.frozen--; }
            if(hasMoat && e.x<130) spd*=Math.max(0.05, 0.5/getCardEffectMult('moat'));
            if(e.poisonTicks>0){
                e.poisonTimer++;
                if(e.poisonTimer>=15){
                    e.poisonTimer=0;
                    e.poisonTicks--;
                    applyDamageToEnemy(e, e.poisonDmgPerTick, e.poisonSource);
                }
                if(e.dead) return;
            }
            if(e.burnTicks>0){
                e.burnTimer++;
                if(e.burnTimer>=20){
                    e.burnTimer=0;
                    e.burnTicks--;
                    applyDamageToEnemy(e, e.burnDmgPerTick, e.burnSource);
                }
                if(e.dead) return;
            }
            e.x-=spd;
            e.frameTimer++;
            if(e.frameTimer>8){e.frameTimer=0;e.frame=(e.frame+1)%4;}
            if(e.x<=100){ 
                // Incremental contact damage (scaled down)
                castleHP-=e.dmg*0.005*waveContactDmgMult*(1-runPowerupBonuses.luckycharm); 
                if(e.x<=70){ 
                    // Direct impact / explosive break on reach
                    let fullDmg = 20; // goblin
                    if(e.type==='skeleton') fullDmg = 22;
                    if(e.type==='knight') fullDmg = 26;
                    if(e.type==='wolf') fullDmg = 24;
                    if(e.type==='siege') fullDmg = 35;
                    if(e.type==='boss') fullDmg = 20+(e.dmg||0);
                    if(e.type==='wagon') fullDmg = 0;
                    if(e.type==='goblin_scout') fullDmg = 16;
                    if(e.type==='goblin_armored') fullDmg = 24;
                    if(e.type==='shade') fullDmg = 26;
                    if(e.type==='wolf_dire') fullDmg = 30;
                    if(e.type==='leshy') fullDmg = 32;
                    if(e.type==='wisphawk') fullDmg = 18;
                    if(e.type==='brambletreant') fullDmg = 28;
                    if(e.type==='embersalamander') fullDmg = 26;
                    if(e.type==='irongolem') fullDmg = 38;
                    if(e.type==='bombbeetle') fullDmg = 34;
                    if(e.type==='golemsentinel') fullDmg = 36;
                    if(e.type==='rottedrevenant') fullDmg = 30;
                    if(e.type==='skyraider') fullDmg = 20;
                    if(e.type==='wyvern') fullDmg = 34;
                    if(e.type==='stoneburrower') fullDmg = 28;
                    if(e.type==='graveworm') fullDmg = 32;
                    castleHP -= fullDmg*waveContactDmgMult*(1-runPowerupBonuses.luckycharm);
                    e.dead=true; 
                } 
            }
        });

        enemies=enemies.filter(e=>!e.dead||e.deathTimer<20);
        enemies.forEach(e=>{ if(e.type==='boss' && !e.dead) bossUpdate(e); });
        if(towersFrozen>0) towersFrozen--;
        towers.forEach(t=>towerUpdate(t));

        // Necromancer's skeleton allies: seek the nearest living enemy inside
        // their range, walk to melee distance, then poke it every ~0.5s
        // until their lifespan runs out.
        skeletonAllies.forEach(sk=>{
            sk.life--;
            let maxEnemyX = (sk.rangePercent * GAME_W / 100);
            let target=null, best=Infinity;
            enemies.forEach(e=>{
                if(e.dead || e.x>maxEnemyX || !canTowerHit('necromancer', e)) return;
                let d=Math.abs(e.x-sk.x);
                if(d<best){ best=d; target=e; }
            });
            if(target){
                let dist = target.x - sk.x;
                if(Math.abs(dist)>14){
                    sk.x += Math.sign(dist)*1.4; // walk toward target
                } else {
                    sk.hitTimer++;
                    if(sk.hitTimer>=30){
                        sk.hitTimer=0;
                        applyDamageToEnemy(target, sk.dmg, sk.sourceTowerId);
                        particles.push({x:target.x,y:target.y,vx:0,vy:-0.5,life:10,color:'#ddddee',size:3});
                    }
                }
            }
        });
        skeletonAllies = skeletonAllies.filter(sk=>sk.life>0);

        if(hasDragon){
            dragonTimer++;
            if(dragonTimer>180){
                dragonTimer=0;
                let dmg = 20*getCardEffectMult('dragon')*globalDmgMult;
                enemies.forEach(e=>{ if(!e.dead && e.x<300) applyDamageToEnemy(e, dmg, 'dragon'); });
                particles.push({x:70,y:130,vx:5,vy:0,life:30,color:'#ff4400',size:8});
            }
        }
        if(hasMeteor){
            // Fires at the same speed as the Cannon (rate 500), always targets
            // whichever alive enemy has the most max HP (the "strongest"),
            // and splashes out to twice the Cannon's splash radius (30 -> 60).
            meteorTimer++;
            if(meteorTimer>500){
                meteorTimer=0;
                let alive = enemies.filter(e=>!e.dead);
                if(alive.length){
                    let target = alive.reduce((best,e)=> e.maxHp>best.maxHp?e:best, alive[0]);
                    let dmg = 20*getCardEffectMult('meteor_card')*globalDmgMult;
                    let splashRadius = 60; // 2x Cannon's splash radius of 30
                    enemies.forEach(e=>{
                        if(e.dead) return;
                        if(Math.hypot(e.x-target.x, e.y-target.y) <= splashRadius) applyDamageToEnemy(e, dmg, 'meteor');
                    });
                    particles.push({x:target.x,y:50,vx:0,vy:4,life:40,color:'#ff8800',size:10});
                }
            }
        }
        if(hasWizard){
            // Cycles through fire -> ice -> lightning, one spell every ~200
            // frames, each scaling with getCardEffectMult('wizard').
            wizardTimer++;
            if(wizardTimer>200){
                wizardTimer=0;
                let spellTypes=['fire','ice','lightning'];
                let spell = spellTypes[wizardSpellIndex % spellTypes.length];
                wizardSpellIndex++;
                let m = getCardEffectMult('wizard');
                let inRange = enemies.filter(e=>!e.dead && e.x<300);
                if(inRange.length){
                    if(spell==='fire'){
                        let tgt = inRange[Math.floor(Math.random()*inRange.length)];
                        applyDamageToEnemy(tgt, 15*m*globalDmgMult, 'wizard');
                        if(!tgt.dead){ tgt.burnTicks=(tgt.burnTicks||0)+4; tgt.burnTimer=0; tgt.burnDmgPerTick=3*m; tgt.burnSource='wizard'; }
                        particles.push({x:tgt.x,y:tgt.y,vx:0,vy:-1,life:20,color:'#ff6600',size:6});
                    } else if(spell==='ice'){
                        inRange.forEach(e=>{ e.frozen = Math.max(e.frozen||0, Math.round(40*kingdomEffectDurationMult)); });
                        particles.push({x:150,y:150,vx:0,vy:0,life:20,color:'#44ccff',size:10});
                    } else if(spell==='lightning'){
                        let current = inRange[Math.floor(Math.random()*inRange.length)];
                        let used=new Set(), hitList=[];
                        for(let i=0;i<3 && current;i++){
                            applyDamageToEnemy(current, 15*m*globalDmgMult*Math.pow(0.6,i), 'wizard');
                            hitList.push({x:current.x,y:current.y});
                            used.add(current);
                            let next=null, nd=70;
                            enemies.forEach(e2=>{ if(e2.dead||used.has(e2)) return; let d=Math.hypot(e2.x-current.x,e2.y-current.y); if(d<nd){ nd=d; next=e2; } });
                            current=next;
                        }
                        lightningBolts.push({points:[{x:150,y:120},...hitList], life:10});
                    }
                }
            }
        }

        projectiles.forEach(p=>{
            if(p.arc){
                p.life--;
                let progress = Math.min(1, Math.max(0, 1-(p.life/p.totalLife)));
                p.x = p.sx + (p.tx-p.sx)*progress;
                p.y = p.sy + (p.ty-p.sy)*progress - p.arcHeight*4*progress*(1-progress);
                p.groundHeight = p.arcHeight*4*progress*(1-progress);
            } else {
                p.x+=p.vx; p.y+=p.vy; p.life--;
            }
            if(p.arc && p.groundHeight>10) return; // mid-flight — too high to hit anything yet
            enemies.forEach(e=>{
                if(e.dead) return;
                if(p.hitSet && p.hitSet.has(e)) return;
                if(!canTowerHit(p.sourceTowerId, e)) return; // flying/underground enemies only hit by their designated towers
                if(Math.abs(p.x-e.x)<14 && Math.abs(p.y-e.y)<18 && p.life>0){
                    if(p.freeze){ e.frozen=Math.round(60*kingdomEffectDurationMult*(p.freezeBonusMult||1)); }
                    else {
                        applyDamageToEnemy(e, p.dmg, p.sourceTowerId);
                        if(p.poison && !e.dead){
                            e.poisonTicks = p.poison.ticks;
                            e.poisonDmgPerTick = p.poison.dmgPerTick;
                            e.poisonSource = p.sourceTowerId;
                            e.poisonTimer = 0;
                        }
                        if(p.sourceTowerId==='firemage' && !e.dead){
                            // Fire Mage applies a small burn DOT on top of its direct hit —
                            // Scholarly Archives extends how long it burns.
                            e.burnTicks = Math.round(3*kingdomEffectDurationMult);
                            e.burnDmgPerTick = 1.5;
                            e.burnSource = p.sourceTowerId;
                            e.burnTimer = 0;
                        }
                    }
                    if(p.splash){
                        let splashMult = (p.sourceTowerId==='cannon'||p.sourceTowerId==='poison') ? kingdomSplashBonusMult : 1;
                        enemies.forEach(e2=>{ if(!e2.dead && canTowerHit(p.sourceTowerId, e2) && Math.hypot(e2.x-e.x,e2.y-e.y)<p.splash) applyDamageToEnemy(e2, p.dmg*0.5*splashMult, p.sourceTowerId); });
                    }
                    if(p.hitSet) p.hitSet.add(e);
                    if(!p.pierce) p.life=0;
                }
            });
            // Alchemist flask that missed its target entirely still shatters on
            // landing, splashing poison over the area instead of doing nothing.
            if(p.type==='poison' && p.arc && p.life<=0 && p.hitSet && p.hitSet.size===0 && p.splash){
                enemies.forEach(e2=>{
                    if(!e2.dead && canTowerHit(p.sourceTowerId, e2) && Math.hypot(e2.x-p.tx,e2.y-p.ty)<p.splash){
                        applyDamageToEnemy(e2, p.dmg*kingdomSplashBonusMult, p.sourceTowerId);
                        if(p.poison && !e2.dead){
                            e2.poisonTicks = p.poison.ticks;
                            e2.poisonDmgPerTick = p.poison.dmgPerTick;
                            e2.poisonSource = p.sourceTowerId;
                            e2.poisonTimer = 0;
                        }
                    }
                });
                particles.push({x:p.tx,y:p.ty,vx:0,vy:0,life:15,color:'#77aa22',size:6});
            }
        });
        projectiles=projectiles.filter(p=>p.life>0);

        if(spawnQueue.length===0 && enemies.filter(e=>!e.dead).length===0 && enemies.length===0){
            if(lastWaveWasBoss && kingdomHealAfterBossPct>0){
                castleHP = Math.min(maxHP, castleHP + maxHP*kingdomHealAfterBossPct);
            }
            lastWaveWasBoss = false;
            startBetweenWave();
        }
        if(castleHP<=0){ castleHP=0; showGameOver(); }
        updateHUD();
    }

    // Draw enemies and projectiles on top
    enemies.forEach(e=>drawEnemy(e,ox,oy,s));
    skeletonAllies.forEach(sk=>drawSkeletonAlly(sk,ox,oy,s));
    projectiles.forEach(p=>drawProjectile(p,ox,oy,s));

    lightningBolts.forEach(b=>{
        b.life--;
        ctx.strokeStyle=`rgba(255,238,68,${Math.min(1,b.life/6)})`;
        ctx.lineWidth=Math.max(1,2*s);
        ctx.beginPath();
        b.points.forEach((pt,i)=>{
            let jx=(Math.random()-0.5)*4, jy=(Math.random()-0.5)*4;
            let px=(ox+pt.x+(i>0?jx:0))*s, py=(oy+pt.y+(i>0?jy:0))*s;
            if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
        });
        ctx.stroke();
        b.points.forEach(pt=>{
            ctx.fillStyle='rgba(255,255,200,0.7)';
            ctx.beginPath(); ctx.arc((ox+pt.x)*s,(oy+pt.y)*s, 3*s, 0, Math.PI*2); ctx.fill();
        });
    });
    lightningBolts=lightningBolts.filter(b=>b.life>0);

    particles.forEach(p=>{
        p.x+=(p.vx||0); p.y+=(p.vy||0); p.life--;
        ctx.fillStyle=p.color;
        ctx.fillRect(p.x*s,p.y*s, (p.size||4)*s, (p.size||4)*s);
    });
    particles=particles.filter(p=>p.life>0);

    requestAnimationFrame(gameLoop);
}

showStart();
requestAnimationFrame(gameLoop);
})();
  </script>
