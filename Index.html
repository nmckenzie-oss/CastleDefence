// ── Teacher setup ──────────────────────────────────────────────────────────

// Suggested code format: <year><term><subject initial><detail>, e.g. Year 9
// biology, term 3, full bank = "93bf"; Year 9 physics, speed topic = "92ps".
const QUESTION_BANK_FILES = {
    '93bf': { file:'question-banks/93bf-biology.json', name:'Year 9 Biology' },
    '92ps': { file:'question-banks/92ps-physics.json',  name:'Year 9 Physics' },
};

// Loads a question bank by teacher/subject code, e.g. "93bf" -> Year 9 Biology.
// Bank files use the format: [{ "q": "...", "o": ["opt1","opt2","opt3","opt4"], "a": correctIndex }, ...]
async function loadQuestionBank(code) {
    code = (code||'').trim().toLowerCase();
    if(!code) {
        questions = defaultQuestions;
        currentBankName = 'General Knowledge';
        currentBankCode = '';
        return { ok:true, name: currentBankName };
    }
    const entry = QUESTION_BANK_FILES[code];
    if(!entry) return { ok:false, error:'code-not-found' };
    try {
        const bankRes = await fetch(entry.file, {cache:'no-store'});
        if(!bankRes.ok) throw new Error('bank fetch failed');
        const bankData = await bankRes.json();
        if(!Array.isArray(bankData) || bankData.length===0) throw new Error('empty bank');
        questions = bankData.map(item => ({ q:item.q, a:item.o, c:item.a }));
        currentBankName = entry.name || code.toUpperCase();
        currentBankCode = code;
        return { ok:true, name: currentBankName };
    } catch(err) {
        console.error('Failed to load question bank:', err);
        return { ok:false, error:'fetch-failed' };
    }
}

// Tower upgrade cycle definitions
const towerUpgradeCycles = {
    archer: ['dmg','range','rate'],
    ballista: ['dmg','range','rate'],
    cannon: ['dmg','splash','rate'],
    firemage: ['dmg','range','rate'],
    icemage: ['range','rate','range'],
    axeman: ['dmg','rate','range'],
};

function pickCards(n) {
    let picked = [];
    for(let i=0;i<n;i++){
        let groupPool = [];
        allCards.forEach(c => { for(let j=0;j<c.groupWeight;j++) groupPool.push(c.group); });
        let selectedGroup = groupPool[Math.floor(Math.random()*groupPool.length)];
        let cardsInGroup = allCards.filter(c => c.group === selectedGroup);
        let cardPool = [];
        cardsInGroup.forEach(c => { for(let j=0;j<c.cardWeight;j++) cardPool.push(c); });
        let card = cardPool[Math.floor(Math.random()*cardPool.length)];
        if(!picked.find(p=>p.id===card.id)) picked.push(card);
        else i--;
        if(picked.length >= allCards.length) break;
    }
    return picked;
}

// City layout: towers placed at the base of the castle, spreading out
function getTowerPosition(index) {
    // Base of castle is around y=220, castle center x ~75
    // Spread towers left and right at base, in rows
    const baseY = 222;
    const centerX = 75;
    const spacing = 22;
    const row = Math.floor(index / 6);
    const col = index % 6;
    // Alternate left/right from center
    const offsets = [-2, -1, 0, 1, 2, 3];
    const x = centerX + offsets[col] * spacing - 10;
    const y = baseY + row * 18;
    return {x, y};
}

function applyCard(card) {
    if(card.type === 'tower') {
        // Check if we already have this tower type
        let existing = towers.find(t => t.id === card.id);
        if(existing) {
            // Upgrade existing tower with cycling stats
            existing.level = (existing.level || 1) + 1;
            let cycle = towerUpgradeCycles[card.id] || ['dmg','range','rate'];
            let upgradeIdx = (existing.level - 2) % cycle.length;
            let stat = cycle[upgradeIdx];
            if(stat === 'dmg') existing.dmg = Math.floor(existing.dmg * 1.4);
            else if(stat === 'range') existing.range = Math.floor(existing.range * 1.25);
            else if(stat === 'rate') existing.rate = Math.max(10, Math.floor(existing.rate * 0.75));
            else if(stat === 'splash') existing.splash = (existing.splash || 30) + 15;
            addTownBuilding();
            return;
        }
        // New tower - place at base like a city
        let pos = getTowerPosition(towers.length);
        towers.push({...card, level:1, x: pos.x, y: pos.y, cooldown:0});
        addTownBuilding();
    }
    // All other upgrades also grow the town
    if(card.type !== 'tower') {
        addTownBuilding();
    }
    cards.push({...card, level:1});
    if(card.id==='goldmine') goldMines++;
    if(card.id==='storehouse'){ maxAmmo+=5; maxGold+=50; }
    if(card.id==='repair') wallHP+=10;
    if(card.id==='stonewalls'){ maxHP+=30; castleHP=Math.min(castleHP+30,maxHP); castleColor='#667799'; }
    if(card.id==='moat') hasMoat=true;
    if(card.id==='servant') globalDmgMult*=2;
    if(card.id==='warhorn') globalSpeedMult*=1.3;
    if(card.id==='commander') globalSpeedMult*=1.2;
    if(card.id==='priest') priestHeal=true;
    if(card.id==='dragon') hasDragon=true;
    if(card.id==='keep'){ maxHP*=2; castleHP=maxHP; }
    if(card.id==='elite') hasElite=true;
    if(card.id==='meteor_card') hasMeteor=true;
    if(card.id==='theking'){ globalDmgMult*=2; globalSpeedMult*=1.5; hasKing=true; }
}

function spawnEnemy(type, x) {
    let e = {x: x||GAME_W+10, y: 225+Math.random()*20, type, frame:0, frameTimer:0, hp:10, maxHp:10, speed:0.4, dmg:5, frozen:0, dead:false, deathTimer:0};
    if(type==='goblin'){e.hp=8+wave*2;e.speed=0.5;e.dmg=3;}
    if(type==='skeleton'){e.hp=12+wave*2;e.speed=0.35;e.dmg=5;}
    if(type==='knight'){e.hp=25+wave*3;e.speed=0.3;e.dmg=8;}
    if(type==='wolf'){e.hp=6+wave;e.speed=0.8;e.dmg=4;}
    if(type==='siege'){e.hp=50+wave*5;e.speed=0.2;e.dmg=15;}
    if(type==='boss'){
        let def = currentBossDef || bossDefs[0];
        e.hp=Math.floor((100+wave*20)*def.hpMult);
        e.speed=0.25*def.speedMult;
        e.dmg=Math.floor(20*def.dmgMult);
        e.y=230;
        e.bossDef=def;
        e.bossId=def.id;
        e.abilityTimers={ summon:0, ranged:0, dash:0, shieldOn:0, shieldOff:0, lifesteal:0, freeze:0 };
        e.shieldActive=false;
        e.shieldReduction=0;
        e.enraged=false;
    }
    e.maxHp=e.hp;
    return e;
}

// Runs each frame for a living boss enemy: handles summon/ranged/dash/shield/lifesteal/freeze/enrage abilities
function bossUpdate(e){
    if(!e.bossDef) return;
    e.bossDef.abilities.forEach(ab=>{
        if(ab.type==='summon'){
            e.abilityTimers.summon++;
            if(e.abilityTimers.summon>=ab.rate){
                e.abilityTimers.summon=0;
                let minion = spawnEnemy(ab.enemyType, e.x - 10 + Math.random()*20);
                enemies.push(minion);
                particles.push({x:e.x,y:e.y,vx:0,vy:-1,life:20,color:'#66ff88',size:5});
            }
        } else if(ab.type==='ranged'){
            e.abilityTimers.ranged++;
            if(e.abilityTimers.ranged>=ab.rate){
                e.abilityTimers.ranged=0;
                castleHP=Math.max(0,castleHP-ab.dmg);
                let col = ab.effect==='lightning' ? '#aaeeff' : '#ff6600';
                for(let i=0;i<6;i++){
                    let t=i/6;
                    particles.push({x:e.x-(e.x-70)*t,y:e.y-(e.y-160)*t,vx:0,vy:0,life:12,color:col,size:6});
                }
            }
        } else if(ab.type==='dash'){
            e.abilityTimers.dash++;
            if(e.abilityTimers.dash>=ab.rate){
                e.abilityTimers.dash=0;
                e.x=Math.max(105,e.x-ab.dist);
                for(let i=0;i<8;i++) particles.push({x:e.x+ab.dist*Math.random(),y:e.y,vx:0,vy:0,life:15,color:'#8833cc',size:4});
            }
        } else if(ab.type==='shield'){
            if(e.shieldActive){
                e.abilityTimers.shieldOff++;
                if(e.abilityTimers.shieldOff>=ab.duration){ e.shieldActive=false; e.abilityTimers.shieldOff=0; }
            } else {
                e.abilityTimers.shieldOn++;
                if(e.abilityTimers.shieldOn>=ab.onRate){ e.shieldActive=true; e.shieldReduction=ab.reduction; e.abilityTimers.shieldOn=0; }
            }
        } else if(ab.type==='lifesteal'){
            e.abilityTimers.lifesteal++;
            if(e.abilityTimers.lifesteal>=ab.rate){
                e.abilityTimers.lifesteal=0;
                if(e.hp<e.maxHp){ e.hp=Math.min(e.maxHp,e.hp+ab.amt); particles.push({x:e.x,y:e.y,vx:0,vy:-1,life:18,color:'#ff0044',size:4}); }
            }
        } else if(ab.type==='freeze_towers'){
            e.abilityTimers.freeze++;
            if(e.abilityTimers.freeze>=ab.rate){
                e.abilityTimers.freeze=0;
                towersFrozen=ab.duration;
                particles.push({x:e.x,y:e.y,vx:0,vy:-1,life:20,color:'#aaeeff',size:6});
            }
        } else if(ab.type==='enrage'){
            if(!e.enraged && e.hp/e.maxHp<=ab.threshold){
                e.enraged=true;
                e.speed*=ab.speedMult;
            }
        }
    });
}

let spawnQueue=[], spawnTimer=0;

function startWave() {
    wave++;
    state='playing';
    gold += goldMines*5;
    if(wallHP>0) castleHP=Math.min(castleHP+wallHP, maxHP);
    if(priestHeal) castleHP=Math.min(castleHP+5, maxHP);
    spawnQueue=[];
    if(wave%5===0){ showBoss(); return; }
    let count = 3 + wave*2;
    for(let i=0;i<count;i++){
        let types=['goblin','goblin','skeleton','knight','wolf','siege'];
        let t=types[Math.floor(Math.random()*Math.min(2+Math.floor(wave/3),types.length))];
        spawnQueue.push(t);
    }
    spawnTimer=0;
    updateHUD();
}

function showBoss(){
    state='boss';
    let def = bossDefs[Math.floor(Math.random()*bossDefs.length)];
    currentBossDef = def;
    modalRoot.innerHTML=`<div class="boss-splash"><div style="font-size:14px;letter-spacing:8px">═══════════════════</div><div style="font-size:28px;margin:16px 0">⚔️ BOSS WAVE ⚔️</div><div style="font-size:20px">${def.name}</div><div style="font-size:13px;margin-top:8px;color:#ffaacc">${def.title}</div><div style="font-size:14px;letter-spacing:8px;margin-top:12px">═══════════════════</div></div>`;
    setTimeout(()=>{
        modalRoot.innerHTML='';
        state='playing';
        spawnQueue=[];
        let bossCount = 1+Math.floor(wave/10);
        for(let i=0;i<bossCount;i++) spawnQueue.push('boss');
        def.abilities.forEach(ab=>{
            if(ab.type==='bodyguard'){
                for(let i=0;i<ab.count;i++) spawnQueue.push(ab.enemyType);
            }
        });
        for(let i=0;i<wave;i++) spawnQueue.push('goblin');
    },2500);
}

function startBetweenWave(){
    state='between';
    betweenWaveQuestions=0; betweenWaveCorrect=0;
    askBetweenQuestion();
}

function askBetweenQuestion(){
    if(betweenWaveQuestions>=4){ showCardSelect(); return; }
    let q=randQ();
    let shuffled = q.a.map((a,i)=>({text:a,correct:i===q.c})).sort(()=>Math.random()-0.5);
    let html=`<div class="modal-overlay"><div class="modal-box"><h2>Between Waves — Question ${betweenWaveQuestions+1}/4</h2><p style="margin-bottom:16px">${q.q}</p>`;
    shuffled.forEach((a,i)=>{ html+=`<button class="choice-btn" data-correct="${a.correct}">${a.text}</button>`; });
    html+=`</div></div>`;
    modalRoot.innerHTML=html;
    modalRoot.querySelectorAll('.choice-btn').forEach(btn=>{
        btn.onclick=()=>{
            let isCorrect=btn.dataset.correct==='true';
            if(isCorrect){ btn.classList.add('correct'); betweenWaveCorrect++; }
            else { btn.classList.add('wrong'); modalRoot.querySelectorAll('.choice-btn').forEach(b=>{ if(b.dataset.correct==='true') b.classList.add('correct'); }); }
            modalRoot.querySelectorAll('.choice-btn').forEach(b=>b.onclick=null);
            betweenWaveQuestions++;
            setTimeout(askBetweenQuestion, 800);
        };
    });
}

function showCardSelect(){
    let n=Math.max(1,betweenWaveCorrect);
    let options=pickCards(n);
    let html=`<div class="modal-overlay"><div class="modal-box"><h2>${betweenWaveCorrect}/4 Correct! Choose one:</h2><div style="margin-top:16px">`;
    options.forEach((c,i)=>{
        let existing = (c.type==='tower') ? towers.find(t=>t.id===c.id) : null;
        let extra = existing ? `<div style="font-size:10px;color:#4caf50;margin-top:2px">⬆ Upgrade Lv${existing.level+1}</div>` : '';
        html+=`<button class="card-btn" data-idx="${i}"><div style="font-size:20px">${c.name}</div><div style="font-size:11px;margin-top:4px;color:#aaa">${c.desc}</div>${extra}</button>`;
    });
    html+=`</div></div></div>`;
    modalRoot.innerHTML=html;
    modalRoot.querySelectorAll('.card-btn').forEach(btn=>{
        btn.onclick=()=>{
            applyCard(options[parseInt(btn.dataset.idx)]);
            modalRoot.innerHTML='';
            startWave();
        };
    });
}

function showQuestion(){
    if(state!=='playing') return;
    state='question';
    let q=randQ();
    let shuffled = q.a.map((a,i)=>({text:a,correct:i===q.c})).sort(()=>Math.random()-0.5);
    let html=`<div class="modal-overlay"><div class="modal-box"><h2>🏹 Answer for Ammo!</h2><p style="margin-bottom:16px">${q.q}</p><p class="text-sm text-red-400 mb-4 font-bold">⚠️ Warning: Incorrect answers deal 1 damage to your Castle!</p>`;
    shuffled.forEach((a,i)=>{ html+=`<button class="choice-btn" data-correct="${a.correct}">${a.text}</button>`; });
    html+=`</div></div>`;
    modalRoot.innerHTML=html;
    modalRoot.querySelectorAll('.choice-btn').forEach(btn=>{
        btn.onclick=()=>{
            let isCorrect=btn.dataset.correct==='true';
            if(isCorrect){ btn.classList.add('correct'); ammo=Math.min(ammo+1,maxAmmo); }
            else { 
                btn.classList.add('wrong'); 
                castleHP = Math.max(0, castleHP - 1);
                modalRoot.querySelectorAll('.choice-btn').forEach(b=>{ if(b.dataset.correct==='true') b.classList.add('correct'); }); 
            }
            modalRoot.querySelectorAll('.choice-btn').forEach(b=>b.onclick=null);
            setTimeout(()=>{ modalRoot.innerHTML=''; state='playing'; updateHUD(); },1000);
        };
    });
}

function showStart(){
    modalRoot.innerHTML=`<div class="modal-overlay"><div class="modal-box" style="text-align:center">
        <h2>🏰 CASTLE DEFENCE</h2>
        <p style="margin:16px 0;color:#aaa">Defend your castle! Click to shoot arrows.<br>Press Q for ammo questions.<br>Survive the waves!</p>
        <div style="text-align:left;background:rgba(0,0,0,0.3);border:1px solid #6a0572;border-radius:8px;padding:12px;margin-bottom:16px">
            <label for="bank-code-input" style="display:block;font-size:12px;color:#00d4ff;margin-bottom:6px">📚 Question Bank Code (ask your teacher — leave blank for general knowledge)</label>
            <input id="bank-code-input" type="text" placeholder="e.g. 93bf" maxlength="20" style="width:100%;padding:8px;border-radius:6px;border:2px solid #e94560;background:#0a0a1a;color:#fff;font-family:'Lexend',sans-serif;font-size:14px;text-transform:lowercase">
            <div id="bank-status" style="font-size:12px;margin-top:6px;min-height:16px;color:#aaa"></div>
        </div>
        <button class="choice-btn" style="text-align:center;font-size:16px" id="start-btn">⚔️ START GAME</button>
    </div></div>`;
    const input = document.getElementById('bank-code-input');
    const status = document.getElementById('bank-status');
    const startBtn = document.getElementById('start-btn');
    input.focus();
    const tryStart = async ()=>{
        startBtn.disabled = true;
        startBtn.textContent = 'Loading...';
        status.style.color = '#aaa';
        status.textContent = input.value.trim() ? 'Loading question bank...' : '';
        const result = await loadQuestionBank(input.value);
        if(result.ok){
            modalRoot.innerHTML='';
            startBetweenWave();
        } else {
            startBtn.disabled = false;
            startBtn.textContent = '⚔️ START GAME';
            status.style.color = '#e74c3c';
            status.textContent = result.error==='code-not-found'
                ? "⚠️ Code not recognised — check with your teacher, or leave blank for general knowledge."
                : "⚠️ Couldn't load question banks (try hosting this file on a local server). Leaving blank uses general knowledge.";
        }
    };
    startBtn.onclick = tryStart;
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') tryStart(); });
}

    state='gameover';
    modalRoot.innerHTML=`<div class="modal-overlay"><div class="modal-box" style="text-align:center"><h2>💀 GAME OVER</h2><p style="margin:16px 0">You survived ${wave} waves!</p><p style="color:#aaa">Towers built: ${towers.length}<br>Total kills: ${kills}</p><button class="choice-btn" style="text-align:center" id="restart-btn">🔄 Play Again</button></div></div>`;

canvas.addEventListener('click', (e)=>{
    if(state!=='playing'||ammo<=0) return;
    ammo--;
    let rect=canvas.getBoundingClientRect();
    let mx=(e.clientX-rect.left)/scale, my=(e.clientY-rect.top)/scale;
    let ox=(W/scale - GAME_W)/2, oy=(H/scale - GAME_H)/2;
    let tx=mx-ox, ty=my-oy;
    let sx=70, sy=160;
    let angle=Math.atan2(ty-sy,tx-sx);
    let spd=5;
    if(hasElite){
        for(let s=-1;s<=1;s++){
            let a=angle+s*0.15;
            projectiles.push({x:sx,y:sy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,dmg:10*globalDmgMult,type:'arrow',life:80});
        }
    } else {
        projectiles.push({x:sx,y:sy,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,dmg:10*globalDmgMult,type:'arrow',life:80});
    }
    updateHUD();
});

function drawBackground(ox, oy, s){
    let grd = ctx.createLinearGradient(0,0,0,(oy+180)*s);
    grd.addColorStop(0,'#0b0b2a');
    grd.addColorStop(0.4,'#1a1a3e');
    grd.addColorStop(0.7,'#2a1a3a');
    grd.addColorStop(1,'#3a2244');
    ctx.fillStyle=grd;
    ctx.fillRect(0,0,W,(oy+220)*s);

    stars.forEach(st=>{
        let twinkle = Math.sin(animFrame*0.03+st.b*10)*0.5+0.5;
        ctx.fillStyle=`rgba(255,255,${200+Math.floor(st.b*55)},${0.3+twinkle*0.7})`;
        let sz = st.b>0.8?2:1;
        ctx.fillRect((ox+st.x)*s,(oy+st.y)*s, sz*s, sz*s);
    });

    ctx.fillStyle='#eeeedd';
    ctx.beginPath();
    ctx.arc((ox+400)*s,(oy+40)*s,12*s,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#ccccbb';
    ctx.beginPath();
    ctx.arc((ox+403)*s,(oy+38)*s,10*s,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle='#221133';
    ctx.beginPath();
    ctx.moveTo(0,(oy+200)*s);
    for(let i=0;i<=16;i++) ctx.lineTo((ox+i*32)*s,(oy+mts1[i])*s);
    ctx.lineTo(W,(oy+200)*s);
    ctx.fill();

    ctx.fillStyle='#1a2a22';
    ctx.beginPath();
    ctx.moveTo(0,(oy+220)*s);
    for(let i=0;i<=16;i++) ctx.lineTo((ox+i*32)*s,(oy+mts2[i])*s);
    ctx.lineTo(W,(oy+220)*s);
    ctx.fill();

    ctx.fillStyle='#2a2a18';
    ctx.fillRect(0,(oy+220)*s,W,H);
    ctx.fillStyle='#333322';
    ctx.fillRect(0,(oy+230)*s,W,H);
    ctx.fillStyle='#445522';
    for(let i=0;i<GAME_W;i+=8){
        let h=2+Math.sin(i*0.3)*1;
        ctx.fillRect((ox+i)*s,(oy+218)*s, 3*s, h*s);
    }
    // Path
    ctx.fillStyle='#3a3520';
    ctx.fillRect((ox+120)*s,(oy+240)*s, (GAME_W-120)*s, 16*s);
    ctx.fillStyle='#4a4530';
    for(let i=120;i<GAME_W;i+=20){
        ctx.fillRect((ox+i)*s,(oy+246)*s, 8*s, 4*s);
    }
}

function drawCastle(ox, oy, s){
    let bx=ox+40, by=oy+140;

    // Main castle keep
    ctx.fillStyle=castleColor;
    ctx.fillRect(bx*s, by*s, 50*s, 80*s);
    // Bricks
    ctx.fillStyle='#4a4a66';
    for(let r=0;r<8;r++){
        for(let c=0;c<4;c++){
            let xOff=(r%2)*6;
            ctx.fillRect((bx+2+c*12+xOff)*s,(by+2+r*10)*s, 10*s, 1*s);
        }
    }
    // Battlements
    for(let i=0;i<5;i++){
        ctx.fillStyle=castleColor;
        ctx.fillRect((bx+i*10)*s,(by-8)*s, 7*s, 10*s);
    }
    // Roof
    ctx.fillStyle='#883344';
    ctx.beginPath();
    ctx.moveTo((bx+10)*s,(by-8)*s);
    ctx.lineTo((bx+25)*s,(by-28)*s);
    ctx.lineTo((bx+40)*s,(by-8)*s);
    ctx.fill();
    ctx.fillStyle='#772233';
    ctx.fillRect((bx+16)*s,(by-20)*s, 18*s, 1*s);
    ctx.fillRect((bx+13)*s,(by-14)*s, 24*s, 1*s);

    // Flag
    let flagW=Math.sin(animFrame*0.06)*2;
    ctx.fillStyle='#aa1133';
    ctx.fillRect((bx+24)*s,(by-42)*s, 2*s, 16*s);
    ctx.fillStyle='#ee2244';
    ctx.fillRect((bx+26)*s,(by-42+flagW)*s, 12*s, 8*s);
    ctx.fillStyle='#ffcc00';
    ctx.fillRect((bx+29)*s,(by-40+flagW)*s, 6*s, 4*s);

    // Windows
    let wGlow=Math.sin(animFrame*0.04)*0.3+0.7;
    ctx.fillStyle=`rgba(255,220,80,${wGlow})`;
    ctx.fillRect((bx+15)*s,(by+30)*s, 5*s, 7*s);
    ctx.fillRect((bx+30)*s,(by+30)*s, 5*s, 7*s);

    // Gate
    ctx.fillStyle='#221100';
    ctx.fillRect((bx+17)*s,(by+55)*s, 16*s, 25*s);
    ctx.fillStyle='#442200';
    ctx.fillRect((bx+19)*s,(by+57)*s, 5*s, 23*s);
    ctx.fillRect((bx+26)*s,(by+57)*s, 5*s, 23*s);

    // Torches
    if(animFrame%6<4){
        ctx.fillStyle='#ff8800';
        ctx.fillRect((bx+5)*s,(by+20)*s, 3*s, 3*s);
        ctx.fillStyle='#ffcc00';
        ctx.fillRect((bx+5)*s,(by+18)*s, 3*s, 2*s);
        ctx.fillStyle='#ff8800';
        ctx.fillRect((bx+42)*s,(by+20)*s, 3*s, 3*s);
        ctx.fillStyle='#ffcc00';
        ctx.fillRect((bx+42)*s,(by+18)*s, 3*s, 2*s);
    }

    // Draw town buildings around castle base based on townBuildings count
    let townSpacing = 8;
    for(let i=0;i<townBuildings;i++){
        let layer = Math.floor(i / 8);
        let posInLayer = i % 8;
        let tx = bx - 20 - layer * 12 + (posInLayer % 2) * 6;
        let ty = by + 50 + layer * 8;
        // Small building blocks
        ctx.fillStyle = '#6a5a4a';
        ctx.fillRect(tx*s, ty*s, 8*s, 6*s);
        ctx.fillStyle = '#5a4a3a';
        ctx.fillRect(tx*s, (ty-2)*s, 8*s, 2*s);
        ctx.fillStyle = '#8a7a6a';
        ctx.fillRect((tx+1)*s, (ty+1)*s, 2*s, 2*s);
        ctx.fillRect((tx+5)*s, (ty+1)*s, 2*s, 2*s);
    }

    // Draw towers at base as city buildings
    towers.forEach((t,i)=>{
        let tx=ox+t.x, ty=oy+t.y;
        drawTower(t, tx, ty, s);
    });

    // Moat
    if(hasMoat){
        ctx.fillStyle='#1a4488';
        ctx.fillRect((bx+50)*s,(oy+218)*s, 20*s, 50*s);
        ctx.fillStyle='#2266aa';
        for(let r=0;r<3;r++){
            let rOff=Math.sin(animFrame*0.05+r)*3;
            ctx.fillRect((bx+53+rOff)*s,(oy+224+r*12)*s, 12*s, 2*s);
        }
    }

    // Dragon perch
    if(hasDragon){
        ctx.fillStyle='#661133';
        ctx.fillRect((bx+15)*s,(by-32)*s, 12*s, 6*s);
        ctx.fillStyle='#aa2255';
        ctx.fillRect((bx+17)*s,(by-36)*s, 8*s, 5*s);
        let wingF=Math.sin(animFrame*0.08)*2;
        ctx.fillStyle='#882244';
        ctx.fillRect((bx+12)*s,(by-34+wingF)*s, 5*s, 3*s);
        ctx.fillRect((bx+25)*s,(by-34-wingF)*s, 5*s, 3*s);
    }

    if(hasKing){
        ctx.fillStyle='#ffcc00';
        ctx.fillRect((bx+22)*s,(by+15)*s, 6*s, 3*s);
        ctx.fillStyle='#ddaa00';
        ctx.fillRect((bx+23)*s,(by+18)*s, 4*s, 6*s);
    }
}

    } else {

        ctx.fillRect(tx*s,(ty-6)*s, 18*s, 28*s);
    }
    // Level indicator
    if(lvlIndicator){
        ctx.fillStyle='#ffcc00';
        for(let i=0;i<Math.min(t.level-1,5);i++){
            ctx.fillRect((tx+2+i*4)*s,(ty-18)*s, 3*s, 3*s);
        }
    }
}

        ctx.fillRect(ex+3, ey+bob-6, 8*s, 8*s);

        ctx.fillRect(ex+16, ey+bob+2, 4*s, 2*s);
    } else if(e.type==='siege'){

        ctx.fillRect(ex-(e.type==='boss'?5:0), (ey+barY)*s, barW*s*(e.hp/e.maxHp), 3*s);

            ctx.fillStyle='#ffcc44';
            ctx.textAlign='center';
            ctx.fillText(e.bossDef.name, ex+8*s-(5*s), (ey+barY-3)*s);
            ctx.textAlign='left';
        }
    }
}

// Detailed boss sprite renderer. Each boss shares a common armored-warrior base
// (torso/legs/head with shading) so silhouettes read clearly at small scale, then
// layers on a unique accessory (wings, crown, staff, cape, etc.) per boss type.
function drawBossSprite(e, ex, ey, s, bob, frozen){
    let def = e.bossDef || bossDefs[0];
    let body = frozen ? '#88ccff' : def.body;
    let robe = frozen ? '#6bb0e0' : def.robe;
    let trim = def.trim;
    let eye = def.eye;
    let pulse = Math.sin(animFrame*0.1)*0.5+0.5;

    // Permanent ground glow in the boss's trim color — keeps every boss readable
    // against the dark background regardless of how dark its body palette is.
    ctx.globalAlpha = 0.22+pulse*0.1;
    ctx.fillStyle = trim;
    ctx.beginPath();
    ctx.ellipse((ex+9)*s, (ey+bob+31)*s, 15*s, 5*s, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Shield aura
    if(e.shieldActive){
        ctx.globalAlpha = 0.35+pulse*0.2;
        ctx.fillStyle = '#aaeeff';
        ctx.beginPath();
        ctx.arc(ex+11*s, (ey+bob+4)*s, 22*s, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
    // Enrage aura
    if(e.enraged){
        ctx.globalAlpha = 0.3+pulse*0.3;
        ctx.fillStyle = '#ff3300';
        ctx.beginPath();
        ctx.arc(ex+11*s, (ey+bob+4)*s, 18*s, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }

    // Legs
    ctx.fillStyle = robe;
    ctx.fillRect((ex+2)*s, (ey+bob+22)*s, 6*s, 9*s);
    ctx.fillRect((ex+12)*s, (ey+bob+22)*s, 6*s, 9*s);
    ctx.fillStyle = '#111';
    ctx.fillRect((ex+2)*s, (ey+bob+29)*s, 6*s, 3*s);
    ctx.fillRect((ex+12)*s, (ey+bob+29)*s, 6*s, 3*s);

    // Torso (layered shading for extra detail/resolution)
    ctx.fillStyle = robe;
    ctx.fillRect(ex*s, (ey+bob-2)*s, 20*s, 26*s);
    ctx.fillStyle = body;
    ctx.fillRect((ex+2)*s, (ey+bob)*s, 16*s, 20*s);
    ctx.fillStyle = trim;
    ctx.fillRect((ex+2)*s, (ey+bob+9)*s, 16*s, 3*s); // belt
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect((ex+3)*s, (ey+bob+1)*s, 5*s, 16*s); // highlight

    // Arms
    ctx.fillStyle = robe;
    ctx.fillRect((ex-4)*s, (ey+bob+2)*s, 5*s, 16*s);
    ctx.fillRect((ex+19)*s, (ey+bob+2)*s, 5*s, 16*s);
    ctx.fillStyle = trim;
    ctx.fillRect((ex-4)*s, (ey+bob+15)*s, 5*s, 4*s);
    ctx.fillRect((ex+19)*s, (ey+bob+15)*s, 5*s, 4*s);

    // Head
    ctx.fillStyle = body;
    ctx.fillRect((ex+4)*s, (ey+bob-14)*s, 12*s, 13*s);
    ctx.fillStyle = robe;
    ctx.fillRect((ex+3)*s, (ey+bob-16)*s, 14*s, 5*s); // brow/helmet band
    // Glowing eyes
    ctx.fillStyle = eye;
    ctx.globalAlpha = 0.6+pulse*0.4;
    ctx.fillRect((ex+6)*s, (ey+bob-9)*s, 3*s, 3*s);
    ctx.fillRect((ex+11)*s, (ey+bob-9)*s, 3*s, 3*s);
    ctx.globalAlpha = 1;

    // Contrast outline around the whole silhouette — makes dark-palette bosses
    // (e.g. Demon Overlord, Necromancer) pop against the dark background.
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = Math.max(1, s*0.6);
    ctx.strokeRect((ex-4)*s, (ey+bob-16)*s, 28*s, 47*s);

    drawBossAccessory(def, e, ex, ey, s, bob, pulse);
}

function drawBossAccessory(def, e, ex, ey, s, bob, pulse){
    const acc = def.accessory;
    if(acc==='wings'){
        let flap = Math.sin(animFrame*0.1)*4;
        ctx.fillStyle = def.robe;
        ctx.beginPath();
        ctx.moveTo((ex+1)*s,(ey+bob+2)*s);
        ctx.lineTo((ex-16)*s,(ey+bob-8-flap)*s);
        ctx.lineTo((ex-10)*s,(ey+bob+10)*s);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo((ex+19)*s,(ey+bob+2)*s);
        ctx.lineTo((ex+36)*s,(ey+bob-8+flap)*s);
        ctx.lineTo((ex+30)*s,(ey+bob+10)*s);
        ctx.fill();
    } else if(acc==='staff_skull'){
        ctx.fillStyle='#444455';
        ctx.fillRect((ex+21)*s,(ey+bob-20)*s, 2*s, 40*s);
        ctx.fillStyle=def.eye;
        ctx.globalAlpha=0.5+pulse*0.5;
        ctx.fillRect((ex+18)*s,(ey+bob-26)*s, 8*s, 7*s);
        ctx.globalAlpha=1;
        ctx.fillStyle='#000';
        ctx.fillRect((ex+20)*s,(ey+bob-24)*s, 1.5*s, 2*s);
        ctx.fillRect((ex+23)*s,(ey+bob-24)*s, 1.5*s, 2*s);
    } else if(acc==='staff_orb'){
        ctx.fillStyle='#334477';
        ctx.fillRect((ex+21)*s,(ey+bob-18)*s, 2*s, 38*s);
        ctx.fillStyle=def.eye;
        ctx.globalAlpha=0.5+pulse*0.5;
        ctx.beginPath(); ctx.arc((ex+22)*s,(ey+bob-22)*s, 5*s, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha=1;
    } else if(acc==='shoulderspikes'){
        ctx.fillStyle='#777';
        for(let i=0;i<3;i++){
            ctx.beginPath();
            ctx.moveTo((ex-2+i*3)*s,(ey+bob-2)*s);
            ctx.lineTo((ex-1+i*3)*s,(ey+bob-9)*s);
            ctx.lineTo((ex+i*3)*s,(ey+bob-2)*s);
            ctx.fill();
        }
        for(let i=0;i<3;i++){
            ctx.beginPath();
            ctx.moveTo((ex+16+i*3)*s,(ey+bob-2)*s);
            ctx.lineTo((ex+17+i*3)*s,(ey+bob-9)*s);
            ctx.lineTo((ex+18+i*3)*s,(ey+bob-2)*s);
            ctx.fill();
        }
    } else if(acc==='hood'){
        ctx.fillStyle=def.robe;
        ctx.fillRect((ex+2)*s,(ey+bob-17)*s, 16*s, 6*s);
        ctx.beginPath();
        ctx.moveTo((ex+4)*s,(ey+bob-17)*s);
        ctx.lineTo((ex+10)*s,(ey+bob-25)*s);
        ctx.lineTo((ex+16)*s,(ey+bob-17)*s);
        ctx.fill();
        if(animFrame%40<20){
            ctx.globalAlpha=0.28;
            ctx.fillStyle='#000';
            ctx.fillRect((ex-4)*s,(ey+bob+2)*s, 28*s, 20*s);
            ctx.globalAlpha=1;
        }
    } else if(acc==='moss'){
        ctx.fillStyle='#5a7a3a';
        ctx.fillRect((ex+1)*s,(ey+bob+2)*s, 5*s, 4*s);
        ctx.fillRect((ex+13)*s,(ey+bob+10)*s, 6*s, 4*s);
        ctx.fillStyle='#333';
        ctx.fillRect((ex+4)*s,(ey+bob-4)*s, 1.5*s, 8*s);
        ctx.fillRect((ex+12)*s,(ey+bob+4)*s, 1.5*s, 10*s);
    } else if(acc==='cape'){
        let sway = Math.sin(animFrame*0.08)*3;
        ctx.fillStyle=def.trim;
        ctx.beginPath();
        ctx.moveTo((ex+1)*s,(ey+bob-1)*s);
        ctx.lineTo((ex-8+sway)*s,(ey+bob+28)*s);
        ctx.lineTo((ex+19)*s,(ey+bob+24)*s);
        ctx.lineTo((ex+19)*s,(ey+bob-1)*s);
        ctx.fill();
        ctx.fillStyle=def.eye;
        ctx.fillRect((ex+7)*s,(ey+bob-5)*s, 6*s, 2*s); // fangs hint
    } else if(acc==='crown'){
        ctx.fillStyle='#ffcc00';
        ctx.fillRect((ex+3)*s,(ey+bob-21)*s, 14*s, 5*s);
        for(let i=0;i<4;i++){
            ctx.beginPath();
            ctx.moveTo((ex+3+i*3.5)*s,(ey+bob-21)*s);
            ctx.lineTo((ex+4.75+i*3.5)*s,(ey+bob-27)*s);
            ctx.lineTo((ex+6.5+i*3.5)*s,(ey+bob-21)*s);
            ctx.fill();
        }
    } else if(acc==='icecrown'){
        ctx.fillStyle='#cceeff';
        for(let i=0;i<3;i++){
            ctx.beginPath();
            ctx.moveTo((ex+4+i*5)*s,(ey+bob-16)*s);
            ctx.lineTo((ex+6.5+i*5)*s,(ey+bob-26)*s);
            ctx.lineTo((ex+9+i*5)*s,(ey+bob-16)*s);
            ctx.fill();
        }
        if(animFrame%20<10){
            ctx.fillStyle='rgba(200,240,255,0.5)';
            ctx.fillRect((ex-2)*s,(ey+bob-30)*s, 24*s, 40*s);
        }
    } else if(acc==='horns'){
        ctx.fillStyle='#221111';
        ctx.beginPath();
        ctx.moveTo((ex+3)*s,(ey+bob-14)*s);
        ctx.lineTo((ex-2)*s,(ey+bob-24)*s);
        ctx.lineTo((ex+6)*s,(ey+bob-13)*s);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo((ex+17)*s,(ey+bob-14)*s);
        ctx.lineTo((ex+22)*s,(ey+bob-24)*s);
        ctx.lineTo((ex+14)*s,(ey+bob-13)*s);
        ctx.fill();
        if(e.enraged){
            ctx.globalAlpha=0.4+pulse*0.4;
            ctx.fillStyle='#ff4400';
            ctx.fillRect((ex-6)*s,(ey+bob-6)*s, 32*s, 30*s);
            ctx.globalAlpha=1;
        }
    }
}

function drawProjectile(p, ox, oy, s){
    let px2=(ox+p.x)*s, py2=(oy+p.y)*s;
    if(p.type==='arrow'){
        ctx.fillStyle='#ffdd44';
        ctx.fillRect(px2,py2, 7*s, 2*s);
        ctx.fillStyle='#aa8833';
        ctx.fillRect(px2+7*s,py2, 2*s, 2*s);
    } else if(p.type==='fire'){
        ctx.fillStyle='#ff4400';
        ctx.fillRect(px2,py2, 6*s, 6*s);
        ctx.fillStyle='#ffaa00';
        ctx.fillRect(px2+1*s,py2+1*s, 4*s, 4*s);
    } else if(p.type==='ice'){
        ctx.fillStyle='#44ccff';
        ctx.fillRect(px2,py2, 5*s, 5*s);
        ctx.fillStyle='#aaeeff';
        ctx.fillRect(px2+1*s,py2+1*s, 3*s, 3*s);
    } else if(p.type==='cannon'){
        ctx.fillStyle='#222';
        ctx.fillRect(px2,py2, 7*s, 7*s);
        ctx.fillStyle='#444';
        ctx.fillRect(px2+1*s,py2+1*s, 5*s, 5*s);
    } else {
        ctx.fillStyle='#fff';
        ctx.fillRect(px2,py2, 4*s, 4*s);
    }
}

function towerUpdate(t){
    if(towersFrozen>0) return;
    t.cooldown--;
    if(t.cooldown>0) return;
    let rate = Math.floor(t.rate / globalSpeedMult);
    // Percentage-based range: tower covers from 0% to rangePercent of the stage width (left side)
    let rangePercent = (t.rangePercent !== undefined) ? t.rangePercent : 50;
    let maxEnemyX = (rangePercent * GAME_W / 100);
    let nearest=null, dist=Infinity;
    enemies.forEach(e=>{
        if(e.dead) return;
        // Check if enemy is in tower's range zone (percentage-based only)
        if(e.x > maxEnemyX) return;
        let d=Math.hypot(e.x-t.x, e.y-t.y);
        if(d<dist){ dist=d; nearest=e; }
    });
    if(!nearest) return;
    t.cooldown=rate;
    let angle=Math.atan2(nearest.y-t.y, nearest.x-t.x);
    let spd=3;
    let ptype='arrow';
    if(t.id==='firemage') ptype='fire';
    if(t.id==='icemage') ptype='ice';
    if(t.id==='cannon') ptype='cannon';
    let dmg=t.dmg*globalDmgMult*(t.level>1?1+t.level*0.3:1);
    projectiles.push({x:t.x+10,y:t.y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,dmg,type:ptype,life:60,freeze:t.freeze,splash:t.splash,pierce:t.pierce});
}

let lastTime=0;
function gameLoop(time){
    let dt=Math.min(time-lastTime, 32);
    lastTime=time;
    animFrame++;

    ctx.fillStyle='#0a0a0a';
    ctx.fillRect(0,0,W,H);

    let s=scale;
    let ox=(W/s - GAME_W)/2, oy=(H/s - GAME_H)/2;

    drawBackground(ox, oy, s);
    drawCastle(ox, oy, s);

    if(state==='playing'){
        spawnTimer++;
        if(spawnQueue.length>0 && spawnTimer>30){
            spawnTimer=0;
            enemies.push(spawnEnemy(spawnQueue.shift()));
        }

        enemies.forEach(e=>{
            if(e.dead){ e.deathTimer++; return; }
            let spd=e.speed;
            if(e.frozen>0){ spd*=0.3; e.frozen--; }
            if(hasMoat && e.x<130) spd*=0.5;
            e.x-=spd;
            e.frameTimer++;
            if(e.frameTimer>8){e.frameTimer=0;e.frame=(e.frame+1)%4;}
            if(e.x<=100){ 
                // Incremental contact damage (scaled down)
                castleHP-=e.dmg*0.005; 
                if(e.x<=70){ 
                    // Direct impact / explosive break on reach
                    let fullDmg = 2; // Default goblin / wolf
                    if(e.type==='skeleton') fullDmg = 4;
                    if(e.type==='knight') fullDmg = 8;
                    if(e.type==='siege') fullDmg = 15;
                    if(e.type==='boss') fullDmg = 20+(e.dmg||0);
                    castleHP -= fullDmg;
                    e.dead=true; 
                } 
            }
        });

        enemies=enemies.filter(e=>!e.dead||e.deathTimer<20);
        enemies.forEach(e=>{ if(e.type==='boss' && !e.dead) bossUpdate(e); });
        if(towersFrozen>0) towersFrozen--;
        towers.forEach(t=>towerUpdate(t));

        if(hasDragon){
            dragonTimer++;
            if(dragonTimer>180){
                dragonTimer=0;
                enemies.forEach(e=>{ if(!e.dead && e.x<300) e.hp-=20*globalDmgMult; });
                particles.push({x:70,y:130,vx:5,vy:0,life:30,color:'#ff4400',size:8});
            }
        }
        if(hasMeteor){
            meteorTimer++;
            if(meteorTimer>300){
                meteorTimer=0;
                enemies.forEach(e=>{ if(!e.dead) e.hp-=30*globalDmgMult; });
                particles.push({x:GAME_W/2,y:50,vx:0,vy:4,life:40,color:'#ff8800',size:10});
            }
        }

        projectiles.forEach(p=>{
            p.x+=p.vx; p.y+=p.vy; p.life--;
            enemies.forEach(e=>{
                if(e.dead) return;
                if(Math.abs(p.x-e.x)<14 && Math.abs(p.y-e.y)<18 && p.life>0){
                    if(p.freeze){ e.frozen=60; }
                    else {
                        let dmgDealt = p.dmg;
                        if(e.shieldActive) dmgDealt *= (1-e.shieldReduction);
                        e.hp-=dmgDealt;
                    }
                    if(p.splash) enemies.forEach(e2=>{ if(!e2.dead && Math.hypot(e2.x-e.x,e2.y-e.y)<p.splash) e2.hp-=p.dmg*0.5; });
                    if(!p.pierce) p.life=0;
                    if(e.hp<=0){ e.dead=true; gold=Math.min(gold+2,maxGold); kills++; }
                }
            });
        });
        projectiles=projectiles.filter(p=>p.life>0);

        if(spawnQueue.length===0 && enemies.filter(e=>!e.dead).length===0 && enemies.length===0) startBetweenWave();
        if(castleHP<=0){ castleHP=0; showGameOver(); }
        updateHUD();
    }

    // Draw enemies and projectiles on top
    enemies.forEach(e=>drawEnemy(e,ox,oy,s));
    projectiles.forEach(p=>drawProjectile(p,ox,oy,s));

    particles.forEach(p=>{
        p.x+=(p.vx||0); p.y+=(p.vy||0); p.life--;
        ctx.fillStyle=p.color;
        ctx.fillRect(p.x*s,p.y*s, (p.size||4)*s, (p.size||4)*s);
    });
    particles=particles.filter(p=>p.life>0);

    requestAnimationFrame(gameLoop);
}

showStart();
requestAnimationFrame(gameLoop);
})();
  </script>
 </body>
</html>
